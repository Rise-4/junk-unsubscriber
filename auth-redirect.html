<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <title>Auth…</title>
</head>
<body style="font-family:Segoe UI,sans-serif;font-size:12px;color:#605e5c;padding:20px;margin:0">
<p>Authentification en cours…</p>
<p style="font-size:10px;color:#a19f9d;margin-top:8px">Cette fenêtre va se fermer automatiquement.</p>
<script>
// Page passive : MSAL dans le taskpane (l'opener) surveille cette URL,
// lit le hash d'auth, puis ferme le popup lui-même. N'exécuter AUCUN
// MSAL ici : ça viderait le hash avant que l'opener ne le lise
// (cause des popups bloqués sur "Authentification en cours…").
//
// Fallback : si la page est ouverte hors popup (pas d'opener) ET qu'on
// a un hash d'auth, rediriger vers le taskpane pour qu'il le traite.
if (!window.opener && location.hash && /[#&](code|error)=/.test(location.hash)) {
  location.replace("https://rise-4.github.io/junk-unsubscriber/JunkUnsubscriber_taskpane.html" + location.hash);
}
</script>
</body>
</html>
