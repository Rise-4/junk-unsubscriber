<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Junk Unsubscriber</title>
  <!-- MSAL 2.x — self-hosted (le CDN Microsoft est bloqué dans l'iframe Outlook) -->
  <script src="https://rise-4.github.io/junk-unsubscriber/msal-browser.min.js"></script>
  <!-- Office.js for add-in context -->
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; font-size: 13px; color: #201f1e; background: #faf9f8; }

    /* Header + debug toggle discret intégré */
    header { background: #0078d4; color: white; padding: 10px 14px 6px; display: flex; align-items: flex-start; justify-content: space-between; }
    header .header-text h1 { font-size: 14px; font-weight: 600; }
    header .header-text p { font-size: 11px; opacity: 0.85; margin-top: 1px; }
    #debug-toggle {
      background: none; border: none; color: rgba(255,255,255,0.35); font-size: 9px;
      cursor: pointer; padding: 0; margin-top: 2px; line-height: 1;
      letter-spacing: 0.5px; text-transform: uppercase; font-family: 'Segoe UI', sans-serif;
    }
    #debug-toggle:hover { color: rgba(255,255,255,0.8); }

    .warning { background: #fff4ce; border-left: 3px solid #f2c94c; padding: 8px 12px; margin: 10px; font-size: 11px; color: #5d4b00; }
    .btn-primary { display: block; width: calc(100% - 20px); margin: 10px; padding: 10px; background: #0078d4; color: white; border: none; border-radius: 4px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn-primary:hover { background: #106ebe; }
    .btn-primary:disabled { background: #c8c6c4; cursor: not-allowed; }
    #status { margin: 0 10px 8px; font-size: 12px; color: #605e5c; min-height: 18px; word-wrap: break-word; }
    #results { margin: 0 10px; }
    .email-item { background: white; border: 1px solid #edebe9; border-radius: 4px; padding: 10px; margin-bottom: 8px; display: flex; align-items: flex-start; gap: 8px; }
    .email-item input[type=checkbox] { margin-top: 2px; flex-shrink: 0; }
    .email-info { flex: 1; overflow: hidden; }
    .email-sender { font-weight: 600; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .email-subject { font-size: 11px; color: #605e5c; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .email-unsub { font-size: 10px; color: #0078d4; word-break: break-all; margin-top: 2px; }
    .folder-badge { display: inline-block; font-size: 9px; font-weight: 600; padding: 1px 5px; border-radius: 3px; margin-right: 4px; vertical-align: middle; }
    .folder-badge.junk { background: #fde7e9; color: #a4262c; }
    .folder-badge.inbox { background: #dff6dd; color: #107c10; }
    .action-bar { display: flex; gap: 8px; margin: 10px; }
    .btn-secondary { flex: 1; padding: 8px; background: white; color: #0078d4; border: 1px solid #0078d4; border-radius: 4px; font-size: 12px; cursor: pointer; font-weight: 600; }
    .btn-secondary:hover { background: #deecf9; }
    .btn-danger { flex: 1; padding: 8px; background: #d13438; color: white; border: none; border-radius: 4px; font-size: 12px; cursor: pointer; font-weight: 600; }
    .btn-danger:hover { background: #a4262c; }
    .count-badge { background: #0078d4; color: white; border-radius: 10px; padding: 1px 7px; font-size: 11px; margin-left: 6px; }
    #select-all-bar { display: flex; align-items: center; margin: 0 10px 8px; gap: 6px; font-size: 12px; color: #605e5c; }
    .hidden { display: none !important; }

    /* Debug panel */
    #debug-panel { display: none; position: fixed; bottom: 0; left: 0; right: 0; max-height: 40vh; background: #1e1e1e; color: #d4d4d4; font-family: 'Consolas', 'Courier New', monospace; font-size: 10px; overflow-y: auto; padding: 8px; z-index: 998; border-top: 2px solid #0078d4; }
    #debug-panel.visible { display: block; }
    .dbg-info { color: #9cdcfe; }
    .dbg-ok { color: #4ec9b0; }
    .dbg-warn { color: #dcdcaa; }
    .dbg-err { color: #f44747; }
    .dbg-line { margin-bottom: 2px; white-space: pre-wrap; word-break: break-all; }
  </style>
</head>
<body>
<header>
  <div class="header-text">
    <h1>🗑️ Junk Unsubscriber</h1>
    <p>Newsletters — Junk + Boîte de réception</p>
  </div>
  <button id="debug-toggle" onclick="toggleDebug()" title="Panneau de debug">debug</button>
</header>

<div class="warning">
  ⚠️ <strong>Conseil sécurité :</strong> Décochez les emails dont vous ne reconnaissez pas l'expéditeur. Se désinscrire d'un vrai spam peut confirmer votre adresse.
</div>

<button class="btn-primary" id="btn-scan">🔍 Scanner Junk + Boîte de réception</button>
<div id="status"></div>

<div id="results-container" class="hidden">
  <div id="select-all-bar">
    <input type="checkbox" id="select-all"/> <label for="select-all">Tout sélectionner</label>
    <span id="count-label"></span>
  </div>
  <div id="results"></div>
  <div class="action-bar">
    <button class="btn-secondary" id="btn-unsub">🔗 Se désinscrire</button>
    <button class="btn-danger" id="btn-delete">🗑️ Supprimer sélectionnés</button>
  </div>
</div>

<div id="debug-panel"></div>

<script>
// ============================================================
// DEBUG SYSTEM — logs visibles dans le panneau
// ============================================================
const debugLines = [];
function dbg(msg, level = "info") {
  const ts = new Date().toLocaleTimeString("fr-FR");
  const cls = level === "ok" ? "dbg-ok" : level === "warn" ? "dbg-warn" : level === "err" ? "dbg-err" : "dbg-info";
  debugLines.push({ line: `[${ts}] ${msg}`, cls });
  console.log(`[DBG-${level.toUpperCase()}]`, msg);
  renderDebug();
}
function renderDebug() {
  const panel = document.getElementById("debug-panel");
  if (!panel) return;
  panel.innerHTML = debugLines.map(d => `<div class="dbg-line ${d.cls}">${escHtml(d.line)}</div>`).join("");
  panel.scrollTop = panel.scrollHeight;
}
function toggleDebug() {
  document.getElementById("debug-panel").classList.toggle("visible");
}

// ============================================================
// CONFIG
// ============================================================
const CLIENT_ID = "89bd4984-6324-4be4-b691-5d74abeff00f";
// FIX MULTI-TENANT : endpoint "organizations" pour que chaque utilisateur
// s'authentifie sur SON propre tenant (mantu, dxc, etc.) et accède à SA boîte.
// L'app Azure est passée en AzureADMultipleOrgs.
const AUTHORITY = "https://login.microsoftonline.com/organizations";
const REDIRECT_URI = "https://rise-4.github.io/junk-unsubscriber/JunkUnsubscriber_taskpane.html";
const GRAPH_SCOPES = ["Mail.ReadWrite"];

dbg("Page chargée — Config OK");
dbg(`Client ID: ${CLIENT_ID}`);
dbg(`Authority: ${AUTHORITY}`);
dbg(`Redirect URI: ${REDIRECT_URI}`);

// ============================================================
// MSAL INIT
// FIX CRITIQUE 1 : cacheLocation "memoryStorage"
// sessionStorage/localStorage bloqués dans l'iframe sandboxée Office.
// ============================================================
let msalInstance = null;
let msalReady = false;

const msalConfig = {
  auth: {
    clientId: CLIENT_ID,
    authority: AUTHORITY,
    redirectUri: REDIRECT_URI,
    navigateToLoginRequestUrl: false
  },
  cache: {
    cacheLocation: "memoryStorage",
    storeAuthStateInCookie: false
  },
  system: {
    loggerOptions: {
      logLevel: 3,
      loggerCallback: (level, message, containsPii) => {
        if (!containsPii) dbg(`[MSAL] ${message}`, "info");
      }
    }
  }
};

dbg("MSAL config créée (cache: memoryStorage)");

async function initMsal() {
  try {
    msalInstance = new msal.PublicClientApplication(msalConfig);
    dbg("MSAL PublicClientApplication instancié", "ok");
    await msalInstance.initialize();
    dbg("MSAL initialize() terminé", "ok");

    const resp = await msalInstance.handleRedirectPromise();
    if (resp) {
      dbg(`handleRedirectPromise: token reçu pour ${resp.account.username}`, "ok");
    } else {
      dbg("handleRedirectPromise: aucun redirect en cours", "info");
    }

    msalReady = true;
    dbg("MSAL prêt", "ok");
  } catch (err) {
    dbg(`MSAL init ERREUR: ${err.message}`, "err");
    dbg(`Stack: ${err.stack}`, "err");
    msalReady = false;
  }
}

// ============================================================
// AUTH : getToken()
// FIX CRITIQUE 2 : waterfall silent → popup → redirect
// ============================================================
async function getToken() {
  if (!msalReady) {
    dbg("getToken appelé mais MSAL pas prêt — tentative init...", "warn");
    await initMsal();
    if (!msalReady) throw new Error("MSAL n'a pas pu s'initialiser");
  }

  const accounts = msalInstance.getAllAccounts();
  dbg(`Comptes MSAL en cache: ${accounts.length}`);

  if (accounts.length > 0) {
    try {
      dbg(`Tentative acquireTokenSilent pour ${accounts[0].username}...`);
      const result = await msalInstance.acquireTokenSilent({
        scopes: GRAPH_SCOPES,
        account: accounts[0]
      });
      dbg(`Token silent OK — expire: ${result.expiresOn}`, "ok");
      return result.accessToken;
    } catch (silentErr) {
      dbg(`acquireTokenSilent échoué: ${silentErr.message}`, "warn");
    }
  }

  try {
    dbg("Tentative acquireTokenPopup...");
    const result = await msalInstance.acquireTokenPopup({ scopes: GRAPH_SCOPES });
    dbg(`Token popup OK — utilisateur: ${result.account.username}`, "ok");
    return result.accessToken;
  } catch (popupErr) {
    dbg(`acquireTokenPopup échoué: ${popupErr.message}`, "warn");

    if (popupErr.message && (
      popupErr.message.includes("popup_window_error") ||
      popupErr.message.includes("monitor_window_timeout") ||
      popupErr.message.includes("block")
    )) {
      dbg("Popup bloqué — fallback vers acquireTokenRedirect...", "warn");
      await msalInstance.acquireTokenRedirect({ scopes: GRAPH_SCOPES });
      return null;
    }

    throw popupErr;
  }
}

// ============================================================
// GRAPH API
// ============================================================
async function callGraph(url, method, body, token) {
  dbg(`Graph ${method} ${url.substring(0, 100)}...`);
  const opts = {
    method: method || "GET",
    headers: {
      "Authorization": "Bearer " + token,
      "Content-Type": "application/json",
      "Prefer": 'outlook.body-content-type="text"'
    }
  };
  if (body) opts.body = JSON.stringify(body);

  const res = await fetch(url, opts);

  if (!res.ok) {
    const errText = await res.text();
    dbg(`Graph ERREUR ${res.status}: ${errText.substring(0, 300)}`, "err");
    throw new Error(`Graph API ${res.status}: ${errText.substring(0, 200)}`);
  }

  if (method === "DELETE" || res.status === 204) {
    dbg("Graph réponse 204 No Content", "ok");
    return null;
  }

  const json = await res.json();
  dbg(`Graph réponse OK — ${json.value ? json.value.length + " items" : "objet"}`, "ok");
  return json;
}

// ============================================================
// HEADER PARSING
// ============================================================
function extractUnsubscribeUrl(headers) {
  if (!headers || !Array.isArray(headers)) return null;
  const header = headers.find(h => h.name.toLowerCase() === "list-unsubscribe");
  if (!header) return null;
  const httpsMatch = header.value.match(/<(https:\/\/[^>]+)>/i);
  if (httpsMatch) return httpsMatch[1];
  const httpMatch = header.value.match(/<(http:\/\/[^>]+)>/i);
  if (httpMatch) return httpMatch[1];
  const plainUrl = header.value.match(/(https?:\/\/[^\s,<>]+)/i);
  return plainUrl ? plainUrl[1] : null;
}

// ============================================================
// UI HELPERS
// ============================================================
function setStatus(msg) {
  document.getElementById("status").textContent = msg;
  if (msg) dbg(`Status: ${msg}`);
}

function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

let foundEmails = [];

// ============================================================
// SCAN — JUNK + BOÎTE DE RÉCEPTION
// FIX CRITIQUE 3 : Approche en 2 étapes (pas de $expand sur junkemail).
// On scanne les deux dossiers en parallèle, puis on récupère les headers
// individuellement par lots de 5.
// ============================================================
document.getElementById("btn-scan").addEventListener("click", async () => {
  const btn = document.getElementById("btn-scan");
  btn.disabled = true;
  setStatus("Connexion en cours...");
  document.getElementById("results-container").classList.add("hidden");
  document.getElementById("results").innerHTML = "";
  foundEmails = [];

  try {
    const token = await getToken();
    if (!token) {
      setStatus("⏳ Redirection d'authentification en cours...");
      btn.disabled = false;
      return;
    }
    dbg(`Token obtenu (${token.substring(0,20)}...)`, "ok");

    // Étape 1 : Lister les messages des deux dossiers en parallèle
    setStatus("Scan Junk + Boîte de réception...");
    dbg("Scan des deux dossiers en parallèle...", "info");

    const [junkData, inboxData] = await Promise.all([
      callGraph(
        "https://graph.microsoft.com/v1.0/me/mailFolders/junkemail/messages?$top=50&$select=id,subject,from",
        "GET", null, token
      ).catch(err => { dbg(`Erreur scan Junk: ${err.message}`, "warn"); return null; }),
      callGraph(
        "https://graph.microsoft.com/v1.0/me/mailFolders/inbox/messages?$top=50&$select=id,subject,from",
        "GET", null, token
      ).catch(err => { dbg(`Erreur scan Inbox: ${err.message}`, "warn"); return null; })
    ]);

    const junkMsgs  = (junkData?.value  || []).map(m => ({ ...m, folder: "junk"  }));
    const inboxMsgs = (inboxData?.value || []).map(m => ({ ...m, folder: "inbox" }));
    const allMessages = [...junkMsgs, ...inboxMsgs];

    dbg(`Junk: ${junkMsgs.length} msg — Inbox: ${inboxMsgs.length} msg — Total: ${allMessages.length}`, "ok");

    if (allMessages.length === 0) {
      setStatus("✅ Aucun email trouvé dans les deux dossiers.");
      btn.disabled = false;
      return;
    }

    setStatus(`${allMessages.length} email(s) trouvé(s) — Analyse des headers...`);

    // Étape 2 : Récupérer les headers individuellement (lots de 5)
    const batchSize = 5;
    let processed = 0;

    for (let i = 0; i < allMessages.length; i += batchSize) {
      const batch = allMessages.slice(i, i + batchSize);
      const promises = batch.map(msg =>
        callGraph(
          `https://graph.microsoft.com/v1.0/me/messages/${msg.id}?$select=id,subject,from,internetMessageHeaders`,
          "GET", null, token
        ).then(detail => ({ detail, folder: msg.folder }))
         .catch(err => {
           dbg(`Erreur header pour ${msg.id}: ${err.message}`, "warn");
           return null;
         })
      );

      const results = await Promise.all(promises);

      for (const item of results) {
        if (!item || !item.detail) continue;
        const { detail, folder } = item;
        const headers = detail.internetMessageHeaders || [];
        const unsubUrl = extractUnsubscribeUrl(headers);
        const hasListUnsub = headers.some(h => h.name.toLowerCase() === "list-unsubscribe");

        if (unsubUrl) {
          foundEmails.push({
            id: detail.id,
            folder,
            subject: detail.subject || "(sans objet)",
            sender: detail.from?.emailAddress?.name || detail.from?.emailAddress?.address || "Inconnu",
            senderEmail: detail.from?.emailAddress?.address || "",
            unsubUrl
          });
          dbg(`✓ [${folder}] ${detail.from?.emailAddress?.address} → ${unsubUrl.substring(0, 60)}`, "ok");
        } else if (hasListUnsub) {
          dbg(`⚠ [${folder}] List-Unsubscribe sans URL HTTP: ${detail.from?.emailAddress?.address}`, "warn");
        }
      }

      processed += batch.length;
      setStatus(`Analyse des headers... ${processed}/${allMessages.length}`);
    }

    if (foundEmails.length === 0) {
      setStatus(`✅ ${allMessages.length} email(s) analysé(s) — Aucune newsletter détectée.`);
      btn.disabled = false;
      return;
    }

    dbg(`${foundEmails.length} newsletter(s) avec lien de désinscription`, "ok");
    setStatus("");
    renderResults();
    document.getElementById("results-container").classList.remove("hidden");

  } catch (err) {
    dbg(`ERREUR SCAN: ${err.message}`, "err");
    dbg(`Stack: ${err.stack}`, "err");
    setStatus(`❌ Erreur : ${err.message}`);
  } finally {
    btn.disabled = false;
  }
});

// ============================================================
// RENDER RESULTS
// ============================================================
function renderResults() {
  const container = document.getElementById("results");
  container.innerHTML = "";
  const label = document.getElementById("count-label");
  label.innerHTML = `<span class="count-badge">${foundEmails.length}</span> newsletter(s) trouvée(s)`;

  foundEmails.forEach((email, i) => {
    const folderLabel = email.folder === "junk"
      ? `<span class="folder-badge junk">Junk</span>`
      : `<span class="folder-badge inbox">Inbox</span>`;
    const div = document.createElement("div");
    div.className = "email-item";
    div.innerHTML = `
      <input type="checkbox" class="email-checkbox" data-index="${i}" checked/>
      <div class="email-info">
        <div class="email-sender">${folderLabel}${escHtml(email.sender)}</div>
        <div class="email-subject">${escHtml(email.subject)}</div>
        <div class="email-unsub" title="${escHtml(email.unsubUrl)}">🔗 ${escHtml(email.unsubUrl.substring(0, 50))}...</div>
      </div>`;
    container.appendChild(div);
  });

  document.getElementById("select-all").checked = true;
}

// ============================================================
// SELECT ALL
// ============================================================
document.getElementById("select-all").addEventListener("change", function() {
  document.querySelectorAll(".email-checkbox").forEach(cb => cb.checked = this.checked);
});

// ============================================================
// UNSUBSCRIBE — avec déduplication des URLs
// FIX 5 : Office.context.ui.displayDialogAsync au lieu de window.open
// Dédup : si la même URL de désinscription apparaît plusieurs fois,
// on n'ouvre qu'une seule page (évite 50 onglets pour le même site).
// ============================================================
document.getElementById("btn-unsub").addEventListener("click", () => {
  const checked = getChecked();
  if (checked.length === 0) { setStatus("Sélectionnez au moins un email."); return; }

  // Déduplication : une seule ouverture par URL unique
  const uniqueUrls = [...new Set(checked.map(i => foundEmails[i].unsubUrl))];
  dbg(`Désinscription : ${checked.length} email(s) → ${uniqueUrls.length} URL(s) unique(s)`, "info");

  let opened = 0;
  uniqueUrls.forEach(url => {
    dbg(`Ouverture désinscription: ${url}`);
    try {
      if (Office && Office.context && Office.context.ui && Office.context.ui.displayDialogAsync) {
        Office.context.ui.displayDialogAsync(url, { height: 60, width: 60 }, (result) => {
          if (result.status === Office.AsyncResultStatus.Failed) {
            dbg(`displayDialogAsync échoué: ${result.error.message} — fallback window.open`, "warn");
            window.open(url, "_blank");
          } else {
            dbg(`Dialog ouvert pour ${url.substring(0, 50)}`, "ok");
          }
        });
      } else {
        window.open(url, "_blank");
      }
      opened++;
    } catch (e) {
      dbg(`Erreur ouverture ${url}: ${e.message}`, "err");
      window.open(url, "_blank");
      opened++;
    }
  });

  const skipped = checked.length - uniqueUrls.length;
  const skipMsg = skipped > 0 ? ` (${skipped} doublon(s) ignoré(s))` : "";
  setStatus(`🔗 ${opened} page(s) de désinscription ouvertes${skipMsg}.`);
});

// ============================================================
// DELETE
// ============================================================
document.getElementById("btn-delete").addEventListener("click", async () => {
  const checked = getChecked();
  if (checked.length === 0) { setStatus("Sélectionnez au moins un email."); return; }

  const btn = document.getElementById("btn-delete");
  btn.disabled = true;
  setStatus("Suppression en cours...");

  try {
    const token = await getToken();
    let ok = 0, errors = 0;
    for (const i of checked) {
      try {
        await callGraph(
          `https://graph.microsoft.com/v1.0/me/messages/${foundEmails[i].id}`,
          "DELETE", null, token
        );
        ok++;
        dbg(`Supprimé: [${foundEmails[i].folder}] ${foundEmails[i].sender}`, "ok");
      } catch (e) {
        errors++;
        dbg(`Erreur suppression ${foundEmails[i].id}: ${e.message}`, "err");
      }
    }
    const checkedSet = new Set(checked);
    foundEmails = foundEmails.filter((_, i) => !checkedSet.has(i));
    setStatus(`✅ ${ok} email(s) supprimé(s)${errors > 0 ? `, ${errors} erreur(s)` : ""}.`);
    if (foundEmails.length === 0) {
      document.getElementById("results-container").classList.add("hidden");
    } else {
      renderResults();
    }
  } catch (err) {
    dbg(`ERREUR DELETE: ${err.message}`, "err");
    setStatus("❌ Erreur : " + err.message);
  } finally {
    btn.disabled = false;
  }
});

// ============================================================
// HELPERS
// ============================================================
function getChecked() {
  return [...document.querySelectorAll(".email-checkbox:checked")].map(cb => parseInt(cb.dataset.index));
}

// ============================================================
// OFFICE.JS INIT
// ============================================================
let officeReady = false;

Office.onReady((info) => {
  officeReady = true;
  dbg(`Office.onReady OK — host: ${info.host}, platform: ${info.platform}`, "ok");
  document.getElementById("btn-scan").disabled = false;
});

// Timeout : si Office.onReady ne répond pas en 5s (test hors Outlook)
setTimeout(() => {
  if (!officeReady) {
    dbg("Office.onReady n'a pas répondu en 5s — activation bouton quand même", "warn");
    document.getElementById("btn-scan").disabled = false;
  }
}, 5000);

document.getElementById("btn-scan").disabled = true;

// ============================================================
// INIT MSAL AU CHARGEMENT
// ============================================================
initMsal().then(() => {
  dbg("Init MSAL au chargement terminée", "ok");
}).catch(err => {
  dbg(`Init MSAL au chargement échouée: ${err.message}`, "err");
});

// ============================================================
// DIAGNOSTICS AUTO AU CHARGEMENT
// ============================================================
(function runDiagnostics() {
  dbg("=== DIAGNOSTICS ===", "info");

  try {
    sessionStorage.setItem("__test", "1");
    sessionStorage.removeItem("__test");
    dbg("sessionStorage: accessible (non utilisé — memoryStorage actif)", "ok");
  } catch (e) {
    dbg("sessionStorage: BLOQUÉ (normal dans iframe Office)", "warn");
  }

  try {
    localStorage.setItem("__test", "1");
    localStorage.removeItem("__test");
    dbg("localStorage: accessible", "ok");
  } catch (e) {
    dbg("localStorage: BLOQUÉ (normal dans iframe Office)", "warn");
  }

  dbg(`URL: ${window.location.href}`, "info");
  dbg(`User-Agent: ${navigator.userAgent.substring(0, 80)}`, "info");
  dbg(`Iframe: ${window !== window.top}`, "info");
  dbg(`msal global: ${typeof msal !== 'undefined' ? 'OK' : 'MANQUANT'}`, typeof msal !== 'undefined' ? "ok" : "err");
  dbg(`Office global: ${typeof Office !== 'undefined' ? 'OK' : 'MANQUANT'}`, typeof Office !== 'undefined' ? "ok" : "err");

  dbg("=== FIN DIAGNOSTICS ===", "info");
})();
</script>
</body>
</html>
