<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Junk Unsubscriber</title>
  <!-- MSAL 2.x — self-hosted (CDN Microsoft bloqué dans l'iframe Outlook) -->
  <script src="https://rise-4.github.io/junk-unsubscriber/msal-browser.min.js"></script>
  <!-- Office.js -->
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; font-size: 13px; color: #201f1e; background: #faf9f8; }

    header { background: #0078d4; color: white; padding: 10px 14px 6px; display: flex; align-items: flex-start; justify-content: space-between; }
    header .header-text h1 { font-size: 14px; font-weight: 600; }
    header .header-text p  { font-size: 11px; opacity: 0.85; margin-top: 1px; }
    #debug-toggle { background: none; border: none; color: rgba(255,255,255,0.3); font-size: 9px; cursor: pointer; padding: 0; margin-top: 2px; line-height: 1; letter-spacing: 0.5px; text-transform: uppercase; font-family: 'Segoe UI', sans-serif; }
    #debug-toggle:hover { color: rgba(255,255,255,0.8); }

    .warning { background: #fff4ce; border-left: 3px solid #f2c94c; padding: 8px 12px; margin: 10px; font-size: 11px; color: #5d4b00; }

    .btn-primary { display: block; width: calc(100% - 20px); margin: 10px; padding: 10px; background: #0078d4; color: white; border: none; border-radius: 4px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn-primary:hover { background: #106ebe; }
    .btn-primary:disabled { background: #c8c6c4; cursor: not-allowed; }

    #status { margin: 0 10px 8px; font-size: 12px; color: #605e5c; min-height: 18px; word-wrap: break-word; }

    /* Group card */
    #results { margin: 0 10px; }
    .group-item { background: white; border: 1px solid #edebe9; border-radius: 4px; padding: 10px; margin-bottom: 8px; }
    .group-header { display: flex; align-items: flex-start; gap: 8px; }
    .group-header input[type=checkbox] { margin-top: 2px; flex-shrink: 0; }
    .group-meta { flex: 1; overflow: hidden; }
    .group-sender { font-weight: 600; font-size: 12px; }
    .group-email  { font-size: 10px; color: #605e5c; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
    .group-url    { font-size: 10px; color: #0078d4; word-break: break-all; margin: 5px 0 6px 24px; }
    .group-actions { display: flex; gap: 6px; margin-left: 24px; flex-wrap: wrap; }

    .folder-badge { display: inline-block; font-size: 9px; font-weight: 600; padding: 1px 5px; border-radius: 3px; margin-right: 4px; vertical-align: middle; }
    .folder-badge.junk  { background: #fde7e9; color: #a4262c; }
    .folder-badge.inbox { background: #dff6dd; color: #107c10; }
    .folder-badge.both  { background: #f3f2f1; color: #323130; }
    .count-badge { background: #0078d4; color: white; border-radius: 10px; padding: 1px 7px; font-size: 11px; margin-left: 4px; }

    .btn-sm { padding: 4px 10px; border-radius: 3px; font-size: 11px; cursor: pointer; font-weight: 600; white-space: nowrap; }
    .btn-sm:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-sm.unsub   { background: white; color: #0078d4; border: 1px solid #0078d4; }
    .btn-sm.unsub:hover:not(:disabled)   { background: #deecf9; }
    .btn-sm.archive { background: white; color: #5c2d91; border: 1px solid #5c2d91; }
    .btn-sm.archive:hover:not(:disabled) { background: #f4eef9; }

    #select-all-bar { display: flex; align-items: center; margin: 0 10px 8px; gap: 6px; font-size: 12px; color: #605e5c; }
    #summary-label  { font-size: 11px; color: #605e5c; }

    .action-bar { display: flex; gap: 8px; margin: 10px; }
    .btn-secondary { flex: 1; padding: 8px; background: white; color: #0078d4; border: 1px solid #0078d4; border-radius: 4px; font-size: 12px; cursor: pointer; font-weight: 600; }
    .btn-secondary:hover { background: #deecf9; }

    #load-more-bar { margin: 0 10px 8px; }
    .btn-load-more { width: 100%; padding: 7px; background: #f3f2f1; color: #323130; border: 1px solid #c8c6c4; border-radius: 4px; font-size: 12px; cursor: pointer; }
    .btn-load-more:hover:not(:disabled) { background: #edebe9; }
    .btn-load-more:disabled { opacity: 0.6; cursor: not-allowed; }

    .hidden { display: none !important; }

    /* Debug panel */
    #debug-panel { display: none; position: fixed; bottom: 0; left: 0; right: 0; max-height: 40vh; background: #1e1e1e; color: #d4d4d4; font-family: 'Consolas','Courier New',monospace; font-size: 10px; overflow-y: auto; padding: 8px; z-index: 998; border-top: 2px solid #0078d4; }
    #debug-panel.visible { display: block; }
    .dbg-info { color: #9cdcfe; } .dbg-ok { color: #4ec9b0; } .dbg-warn { color: #dcdcaa; } .dbg-err { color: #f44747; }
    .dbg-line { margin-bottom: 2px; white-space: pre-wrap; word-break: break-all; }
  </style>
</head>
<body>

<header>
  <div class="header-text">
    <h1>🗑️ Junk Unsubscriber</h1>
    <p>Newsletters — Junk + Boîte de réception</p>
  </div>
  <button id="debug-toggle" onclick="toggleDebug()" title="Panneau de debug">debug</button>
</header>

<div class="warning">
  ⚠️ <strong>Conseil sécurité :</strong> Décochez les expéditeurs que vous ne reconnaissez pas. Se désinscrire d'un vrai spam peut confirmer votre adresse.
</div>

<button class="btn-primary" id="btn-scan">🔍 Scanner Junk + Boîte de réception</button>
<div id="status"></div>

<div id="results-container" class="hidden">
  <div id="select-all-bar">
    <input type="checkbox" id="select-all"/>
    <label for="select-all">Tout sélectionner</label>
    <span id="summary-label"></span>
  </div>
  <div id="results"></div>
  <div id="load-more-bar" class="hidden">
    <button class="btn-load-more" id="btn-load-more">▼ Scanner 100 emails de plus</button>
  </div>
  <div class="action-bar">
    <button class="btn-secondary" id="btn-unsub-bulk">🔗 Se désinscrire (sélectionnés)</button>
    <button class="btn-secondary" id="btn-archive-bulk">📦 Archiver (sélectionnés)</button>
  </div>
</div>

<div id="debug-panel"></div>

<script>
// ============================================================
// GARDE-FOU : si cette page est chargée dans un popup MSAL
// (window.opener présent + hash d'auth), on délègue juste à MSAL
// et on ne lance PAS l'UI du taskpane (évite block_nested_popups).
// ============================================================
if (window.opener && window.opener !== window && /[#&](code|error|id_token|access_token)=/.test(window.location.hash)) {
  document.addEventListener("DOMContentLoaded", () => {
    document.body.innerHTML = "<p style='font-family:Segoe UI;font-size:12px;color:#605e5c;padding:20px'>Authentification…</p>";
  });
  // MSAL (chargé par le <script> au-dessus) traitera le hash via handleRedirectPromise
  // puis fermera automatiquement le popup. On n'exécute pas la suite.
  throw new Error("__msal_popup_redirect__");
}

// ============================================================
// DEBUG
// ============================================================
const debugLines = [];
function dbg(msg, level = "info") {
  const ts = new Date().toLocaleTimeString("fr-FR");
  const cls = { ok:"dbg-ok", warn:"dbg-warn", err:"dbg-err" }[level] || "dbg-info";
  debugLines.push({ line: `[${ts}] ${msg}`, cls });
  console.log(`[DBG-${level.toUpperCase()}]`, msg);
  renderDebug();
}
function renderDebug() {
  const p = document.getElementById("debug-panel");
  if (!p) return;
  p.innerHTML = debugLines.map(d => `<div class="dbg-line ${d.cls}">${escHtml(d.line)}</div>`).join("");
  p.scrollTop = p.scrollHeight;
}
function toggleDebug() { document.getElementById("debug-panel").classList.toggle("visible"); }

// ============================================================
// CONFIG
// ============================================================
const CLIENT_ID   = "89bd4984-6324-4be4-b691-5d74abeff00f";
// Multi-tenant : chaque utilisateur s'authentifie sur SON tenant (Rise, Mantu, DXC…)
const AUTHORITY   = "https://login.microsoftonline.com/organizations";
// Page dédiée pour la redirection : évite de recharger le taskpane dans le popup
// (sinon block_nested_popups quand la 2e instance re-init MSAL).
const REDIRECT_URI = "https://rise-4.github.io/junk-unsubscriber/auth-redirect.html";
// Mail.Send requis pour l'action Graph /unsubscribe (cas mailto:) — RFC 8058
const GRAPH_SCOPES = ["Mail.ReadWrite", "Mail.Send"];
const PAGE_SIZE   = 200; // emails par dossier par page (Graph max = 1000, on reste raisonnable)

dbg("Page chargée"); dbg(`Authority: ${AUTHORITY}`);

// ============================================================
// MSAL
// ============================================================
let msalInstance = null, msalReady = false;

const msalConfig = {
  auth: { clientId: CLIENT_ID, authority: AUTHORITY, redirectUri: REDIRECT_URI, navigateToLoginRequestUrl: false },
  cache: {
    // localStorage : partage l'état d'interaction entre taskpane et popup d'auth
    // (les diagnostics confirment qu'il est accessible dans ce contexte).
    cacheLocation: "localStorage",
    storeAuthStateInCookie: true
  },
  system: {
    loggerOptions: {
      logLevel: 3,
      loggerCallback: (level, msg, pii) => { if (!pii) dbg(`[MSAL] ${msg}`); }
    }
  }
};

async function initMsal() {
  try {
    msalInstance = new msal.PublicClientApplication(msalConfig);
    await msalInstance.initialize();
    const resp = await msalInstance.handleRedirectPromise();
    if (resp) dbg(`Redirect token reçu: ${resp.account.username}`, "ok");
    msalReady = true;
    dbg("MSAL prêt", "ok");
  } catch (err) {
    dbg(`MSAL init ERREUR: ${err.message}`, "err");
    msalReady = false;
  }
}

async function getToken() {
  if (!msalReady) {
    await initMsal();
    if (!msalReady) throw new Error("MSAL non initialisé");
  }
  const accounts = msalInstance.getAllAccounts();
  if (accounts.length > 0) {
    try {
      const r = await msalInstance.acquireTokenSilent({ scopes: GRAPH_SCOPES, account: accounts[0] });
      dbg("Token silent OK", "ok");
      return r.accessToken;
    } catch (e) { dbg(`Silent échoué: ${e.message}`, "warn"); }
  }
  try {
    const r = await msalInstance.acquireTokenPopup({ scopes: GRAPH_SCOPES });
    dbg(`Token popup OK — ${r.account.username}`, "ok");
    return r.accessToken;
  } catch (popupErr) {
    dbg(`Popup échoué: ${popupErr.message}`, "warn");
    const blocked = popupErr.message?.includes("popup_window_error") ||
                    popupErr.message?.includes("monitor_window_timeout") ||
                    popupErr.message?.includes("block") ||
                    popupErr.message?.includes("popup_blocked") ||
                    popupErr.errorCode === "popup_window_error" ||
                    popupErr.errorCode === "monitor_window_timeout";
    if (blocked) {
      dbg("Popup bloqué — fallback redirect...", "warn");
      await msalInstance.acquireTokenRedirect({ scopes: GRAPH_SCOPES });
      return null;
    }
    throw popupErr;
  }
}

// ============================================================
// GRAPH API
// ============================================================
async function callGraph(url, method, body, token, retries = 3) {
  dbg(`Graph ${method} ${url.substring(0, 90)}...`);
  const opts = {
    method: method || "GET",
    headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" }
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);

  // Throttling Graph : respecter Retry-After puis retenter
  if (res.status === 429 && retries > 0) {
    const ra = parseInt(res.headers.get("Retry-After") || "1", 10);
    dbg(`Graph 429 — retry dans ${ra}s (reste ${retries - 1})`, "warn");
    await new Promise(r => setTimeout(r, ra * 1000));
    return callGraph(url, method, body, token, retries - 1);
  }
  // Erreurs transientes : 503, 504 → retry avec backoff exponentiel
  if ((res.status === 503 || res.status === 504) && retries > 0) {
    const wait = (4 - retries) * 1000;
    dbg(`Graph ${res.status} — retry dans ${wait}ms`, "warn");
    await new Promise(r => setTimeout(r, wait));
    return callGraph(url, method, body, token, retries - 1);
  }

  if (!res.ok) {
    const txt = await res.text();
    dbg(`Graph ERREUR ${res.status}: ${txt.substring(0, 200)}`, "err");
    throw new Error(`Graph ${res.status}: ${txt.substring(0, 100)}`);
  }
  if (method === "POST" && res.status === 201) return res.json();
  if (res.status === 204 || method === "DELETE") return null;
  if (res.status === 202) return null; // Graph unsubscribe action
  return res.json();
}

// ============================================================
// HEADER PARSING (RFC 8058 aware)
// ============================================================
// Retourne { oneClickUrl, mailtoUrl, httpsUrl, displayLabel, method }
// - oneClickUrl  : URL à POSTer en RFC 8058 one-click (header + List-Unsubscribe-Post)
// - mailtoUrl    : mailto: trouvé dans le header (utilisable via Graph /unsubscribe)
// - httpsUrl     : URL HTTPS du header (fallback popup si pas de one-click)
// - displayLabel : courte description user-friendly (hostname ou adresse mailto)
// - method       : "one-click" | "graph-mailto" | "popup" | null
function extractUnsubscribeInfo(headers) {
  const info = { oneClickUrl: null, mailtoUrl: null, httpsUrl: null, displayLabel: "", method: null };
  const hs = Array.isArray(headers) ? headers : [];
  const byName = (n) => hs.find(h => h.name && h.name.toLowerCase() === n.toLowerCase());

  const lu = byName("list-unsubscribe");
  const luPost = byName("list-unsubscribe-post");

  if (lu && lu.value) {
    const tokens = [...lu.value.matchAll(/<([^>]+)>/g)].map(m => m[1].trim());
    for (const t of tokens) {
      if (/^mailto:/i.test(t) && !info.mailtoUrl) info.mailtoUrl = t;
      else if (/^https?:\/\//i.test(t) && !info.httpsUrl) info.httpsUrl = t;
    }
    if (!info.httpsUrl && !info.mailtoUrl) {
      const plain = lu.value.match(/(https?:\/\/[^\s,<>]+)/i);
      if (plain) info.httpsUrl = plain[1];
    }
    if (luPost && /list-unsubscribe\s*=\s*one-click/i.test(luPost.value) && info.httpsUrl) {
      info.oneClickUrl = info.httpsUrl;
    }
  }

  // Label affiché : hostname (propre, lisible) plutôt que l'URL brute type /api/...
  if (info.oneClickUrl || info.httpsUrl) {
    try { info.displayLabel = new URL(info.oneClickUrl || info.httpsUrl).hostname; }
    catch { info.displayLabel = (info.oneClickUrl || info.httpsUrl).substring(0, 40); }
  } else if (info.mailtoUrl) {
    info.displayLabel = info.mailtoUrl.replace(/^mailto:/i, "").split("?")[0];
  }

  if (info.oneClickUrl)      info.method = "one-click";
  else if (info.mailtoUrl)   info.method = "graph-mailto";
  else if (info.httpsUrl)    info.method = "popup";
  return info;
}

// ============================================================
// STATE
// ============================================================
// Groups indexed by integer (avoids CSS selector escaping issues)
// { key, sender, senderEmail, info: {oneClickUrl, mailtoUrl, httpsUrl, bodyUrl, displayUrl, method},
//   folders: Set, emails: [{id, subject, folder}] }
let groups = [];
let junkNextLink = null;
let inboxNextLink = null;

// Extrait le domaine "racine" (2 derniers labels) d'un email pour regrouper
// les variantes VERP / sous-domaines (bounce-xxx@mail.acme.com → acme.com,
// news@e.linkedin.com → linkedin.com). Fallback sur l'email complet normalisé.
function groupingKey(senderEmail) {
  const email = (senderEmail || "").trim().toLowerCase();
  const at = email.lastIndexOf("@");
  if (at === -1) return email;
  const domain = email.slice(at + 1);
  const parts = domain.split(".").filter(Boolean);
  if (parts.length < 2) return email;
  return parts.slice(-2).join(".");
}

function findOrCreateGroup(senderEmail, info, sender) {
  const key = groupingKey(senderEmail);
  let g = groups.find(g => g.key === key);
  if (!g) {
    g = { key, sender, senderEmail, info, folders: new Set(), emails: [] };
    groups.push(g);
  } else {
    // Upgrade l'info si le nouvel email fournit une méthode meilleure
    // (one-click > graph-mailto > popup)
    const rank = { "one-click": 3, "graph-mailto": 2, "popup": 1 };
    if ((rank[info.method] || 0) > (rank[g.info.method] || 0)) g.info = info;
  }
  return g;
}

// ============================================================
// FETCH + PROCESS A PAGE (Graph $batch — 20 requêtes par appel)
// ============================================================
// On ne récupère QUE les headers (pas le body) : ~2 KB par email au lieu de
// 50-200 KB. Gain typique : 5-10x plus rapide.
async function fetchAndProcess(url, folder, token) {
  const data = await callGraph(url, "GET", null, token).catch(err => {
    dbg(`Erreur scan ${folder}: ${err.message}`, "warn");
    return null;
  });
  if (!data) return null;

  const messages = data.value || [];
  dbg(`${folder}: ${messages.length} messages`, "ok");

  const BATCH = 20; // Graph $batch max = 20
  for (let i = 0; i < messages.length; i += BATCH) {
    const slice = messages.slice(i, i + BATCH);
    const requests = slice.map((msg, idx) => ({
      id: String(idx),
      method: "GET",
      url: `/me/messages/${msg.id}?$select=id,subject,from,internetMessageHeaders`
    }));

    let responses = [];
    try {
      const resp = await callGraph(
        "https://graph.microsoft.com/v1.0/$batch",
        "POST", { requests }, token
      );
      responses = resp.responses || [];
    } catch (err) {
      dbg(`Batch ${i}: ${err.message}`, "warn");
      continue;
    }

    for (const r of responses) {
      if (r.status !== 200 || !r.body) {
        if (r.status === 429) dbg(`Sub-request 429 (throttled) — ignoré`, "warn");
        continue;
      }
      const d = r.body;
      const info = extractUnsubscribeInfo(d.internetMessageHeaders || []);
      if (!info.method) continue;
      const senderEmail = d.from?.emailAddress?.address || "";
      const sender      = d.from?.emailAddress?.name || senderEmail || "Inconnu";
      const g = findOrCreateGroup(senderEmail, info, sender);
      g.folders.add(folder);
      g.emails.push({ id: d.id, subject: d.subject || "(sans objet)", folder });
    }
    setStatus(`Analyse ${folder}… ${Math.min(i + BATCH, messages.length)}/${messages.length} — ${groups.length} expéditeur(s)`);
  }
  return data["@odata.nextLink"] || null;
}

// ============================================================
// SCAN BUTTON
// ============================================================
document.getElementById("btn-scan").addEventListener("click", async () => {
  const btn = document.getElementById("btn-scan");
  btn.disabled = true;
  setStatus("Connexion en cours...");
  document.getElementById("results-container").classList.add("hidden");
  document.getElementById("results").innerHTML = "";
  groups = [];
  junkNextLink = null;
  inboxNextLink = null;

  try {
    const token = await getToken();
    if (!token) { setStatus("⏳ Redirection d'authentification..."); btn.disabled = false; return; }

    setStatus("Scan en cours...");
    const [junkNext, inboxNext] = await Promise.all([
      fetchAndProcess(
        `https://graph.microsoft.com/v1.0/me/mailFolders/junkemail/messages?$top=${PAGE_SIZE}&$select=id,subject,from`,
        "junk", token
      ),
      fetchAndProcess(
        `https://graph.microsoft.com/v1.0/me/mailFolders/inbox/messages?$top=${PAGE_SIZE}&$select=id,subject,from`,
        "inbox", token
      )
    ]);
    junkNextLink  = junkNext;
    inboxNextLink = inboxNext;

    if (groups.length === 0) {
      const total = groups.reduce((n, g) => n + g.emails.length, 0);
      setStatus(`✅ Aucune newsletter trouvée dans les ${PAGE_SIZE * 2} derniers emails.`);
      btn.disabled = false;
      return;
    }

    setStatus("");
    renderResults();
    document.getElementById("results-container").classList.remove("hidden");
    updateLoadMore();

  } catch (err) {
    dbg(`ERREUR SCAN: ${err.message}`, "err");
    setStatus(`❌ Erreur : ${err.message}`);
  } finally {
    btn.disabled = false;
  }
});

// ============================================================
// LOAD MORE BUTTON
// ============================================================
document.getElementById("btn-load-more").addEventListener("click", async () => {
  const btn = document.getElementById("btn-load-more");
  btn.disabled = true;
  btn.textContent = "⏳ Chargement...";
  try {
    const token = await getToken();
    if (!token) { btn.disabled = false; btn.textContent = "▼ Scanner 100 emails de plus"; return; }
    await Promise.all([
      junkNextLink  ? fetchAndProcess(junkNextLink,  "junk",  token).then(nl => junkNextLink  = nl) : null,
      inboxNextLink ? fetchAndProcess(inboxNextLink, "inbox", token).then(nl => inboxNextLink = nl) : null,
    ]);
    renderResults();
    updateLoadMore();
    setStatus("");
  } catch (err) {
    dbg(`ERREUR LOAD MORE: ${err.message}`, "err");
    setStatus(`❌ Erreur : ${err.message}`);
  } finally {
    btn.disabled = false;
    btn.textContent = "▼ Scanner 100 emails de plus";
  }
});

function updateLoadMore() {
  document.getElementById("load-more-bar").classList.toggle("hidden", !junkNextLink && !inboxNextLink);
}

// ============================================================
// RENDER RESULTS
// ============================================================
function renderResults() {
  const container = document.getElementById("results");
  container.innerHTML = "";

  const totalEmails = groups.reduce((n, g) => n + g.emails.length, 0);
  document.getElementById("summary-label").innerHTML =
    `<span class="count-badge">${groups.length}</span> expéditeur(s) · ${totalEmails} email(s)`;

  groups.forEach((group, idx) => {
    const folderLabel = (group.folders.has("junk") && group.folders.has("inbox"))
      ? `<span class="folder-badge both">Junk+Inbox</span>`
      : group.folders.has("junk")
        ? `<span class="folder-badge junk">Junk</span>`
        : `<span class="folder-badge inbox">Inbox</span>`;

    const label = group.info.displayLabel || "";
    const methodIcon  = { "one-click": "⚡", "graph-mailto": "✉️", "popup": "🔗" }[group.info.method] || "🔗";
    const methodLabel = { "one-click": "1-clic", "graph-mailto": "mail auto", "popup": "page web" }[group.info.method] || "";
    const fullUrl = group.info.oneClickUrl || group.info.httpsUrl || group.info.mailtoUrl || "";

    const div = document.createElement("div");
    div.className = "group-item";
    div.dataset.idx = idx;
    div.innerHTML = `
      <div class="group-header">
        <input type="checkbox" class="group-checkbox" data-idx="${idx}" checked/>
        <div class="group-meta">
          <div class="group-sender">${folderLabel}${escHtml(group.sender)}<span class="count-badge">${group.emails.length}</span></div>
          <div class="group-email">${escHtml(group.senderEmail)}</div>
        </div>
      </div>
      <div class="group-url" title="${escHtml(fullUrl)}">${methodIcon} <span style="color:#605e5c">[${methodLabel}]</span> ${escHtml(label)}</div>
      <div class="group-actions">
        <button class="btn-sm unsub">${methodIcon} Se désinscrire</button>
        <button class="btn-sm archive">📦 Archiver (${group.emails.length})</button>
      </div>`;

    const unsubBtn  = div.querySelector(".btn-sm.unsub");
    const archiveBtn = div.querySelector(".btn-sm.archive");

    unsubBtn.addEventListener("click",  () => executeUnsubscribe(idx, div, unsubBtn, archiveBtn));
    archiveBtn.addEventListener("click", () => archiveGroup(idx, div, archiveBtn));

    container.appendChild(div);
  });

  document.getElementById("select-all").checked = true;
}

// ============================================================
// EXECUTE UNSUBSCRIBE (RFC 8058)
// ============================================================
// Stratégie par ordre de préférence :
//   1. one-click POST (RFC 8058) — silencieux, pas de popup, auto-archive ensuite
//   2. Graph /unsubscribe (mailto) — Graph envoie le mail de désabonnement
//   3. popup sur l'URL user-friendly (body) ou HTTPS du header — user doit cliquer
async function executeUnsubscribe(idx, cardEl, unsubBtn, archiveBtn) {
  const group = groups[idx];
  if (!group) return;
  const info = group.info;
  unsubBtn.disabled = true;
  const origLabel = unsubBtn.textContent;
  unsubBtn.textContent = "⏳…";

  try {
    // --- Méthode 1 : RFC 8058 one-click POST ---
    if (info.method === "one-click" && info.oneClickUrl) {
      dbg(`One-click POST → ${info.oneClickUrl}`);
      const ok = await postOneClickUnsubscribe(info.oneClickUrl);
      if (ok) {
        // Feedback visuel : carte verte + bouton "✅ Désinscrit" (le one-click est
        // silencieux côté serveur, sans ça on ne verrait rien).
        // La carte reste visible — le bouton Archiver est séparé, à la main de l'user.
        markCardSuccess(cardEl, unsubBtn, `✅ Désinscrit`);
        setStatus(`✅ Désinscription envoyée à ${group.sender}. Clique 📦 Archiver pour nettoyer les ${group.emails.length} email(s) existants.`);
        return;
      }
      dbg(`One-click POST échoué, fallback popup`, "warn");
    }

    // --- Méthode 2 : Graph /unsubscribe (mailto) ---
    if (info.method === "graph-mailto" && group.emails[0]?.id) {
      dbg(`Graph /unsubscribe via ${info.mailtoUrl}`);
      try {
        const token = await getToken();
        if (!token) { unsubBtn.disabled = false; unsubBtn.textContent = origLabel; return; }
        await callGraph(
          `https://graph.microsoft.com/beta/me/messages/${group.emails[0].id}/unsubscribe`,
          "POST", null, token
        );
        markCardSuccess(cardEl, unsubBtn, `✅ Mail envoyé`);
        setStatus(`✅ Mail de désinscription envoyé à ${group.sender}. Clique 📦 Archiver pour nettoyer les ${group.emails.length} email(s) existants.`);
        return;
      } catch (err) {
        dbg(`Graph /unsubscribe ERREUR: ${err.message} — fallback popup`, "warn");
      }
    }

    // --- Méthode 3 : popup (user clique lui-même) ---
    const url = info.bodyUrl || info.httpsUrl || info.mailtoUrl;
    if (!url) {
      setStatus(`❌ Aucune méthode de désinscription trouvée pour ${group.sender}.`);
      unsubBtn.disabled = false;
      unsubBtn.textContent = origLabel;
      return;
    }
    dbg(`Popup → ${url}`);
    openUrlPopup(url);
    setStatus(`🔗 Page de désinscription ouverte pour ${group.sender}. Finalise dans l'onglet.`);
    unsubBtn.disabled = false;
    unsubBtn.textContent = "✓ Ouvert — archiver ?";
  } catch (err) {
    dbg(`ERREUR executeUnsubscribe: ${err.message}`, "err");
    setStatus(`❌ Erreur : ${err.message}`);
    unsubBtn.disabled = false;
    unsubBtn.textContent = origLabel;
  }
}

// POST one-click RFC 8058. Mode no-cors : fire-and-forget.
// Le serveur traite la requête (DKIM + token suffisent), on ne peut pas lire la réponse
// depuis un iframe Office. Retourne true si la requête est partie sans erreur réseau.
async function postOneClickUnsubscribe(url) {
  try {
    await fetch(url, {
      method: "POST",
      mode: "no-cors",
      credentials: "omit",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: "List-Unsubscribe=One-Click"
    });
    dbg(`One-click POST envoyé (no-cors, réponse opaque)`, "ok");
    return true;
  } catch (e) {
    dbg(`One-click POST erreur réseau: ${e.message}`, "err");
    return false;
  }
}

// Ouvre une URL dans un popup/dialog Office. Utilisé pour les cas non-automatisables.
function openUrlPopup(url) {
  try {
    if (Office?.context?.ui?.displayDialogAsync) {
      Office.context.ui.displayDialogAsync(url, { height: 60, width: 60 }, result => {
        if (result.status === Office.AsyncResultStatus.Failed) {
          dbg(`Dialog échoué — fallback window.open`, "warn");
          window.open(url, "_blank");
        }
      });
    } else {
      window.open(url, "_blank");
    }
  } catch (e) { window.open(url, "_blank"); }
}

// Feedback visuel quand la désinscription a réussi mais qu'il n'y a pas de page à ouvrir
// (one-click POST ou Graph mailto). Carte verte + bouton "✅ Désinscrit" désactivé.
// La carte reste visible, l'archivage reste à la main de l'utilisateur.
function markCardSuccess(cardEl, unsubBtn, label) {
  cardEl.style.transition = "background 0.3s, border-color 0.3s";
  cardEl.style.background = "#dff6dd";
  cardEl.style.borderColor = "#107c10";
  unsubBtn.textContent = label;
  unsubBtn.style.color = "#107c10";
  unsubBtn.style.borderColor = "#107c10";
  unsubBtn.style.background = "#f0fbef";
  unsubBtn.disabled = true;
}

// ============================================================
// ARCHIVE GROUP
// ============================================================
async function archiveGroup(idx, cardEl, archiveBtn) {
  const group = groups[idx];
  if (!group) return;

  archiveBtn.disabled = true;
  archiveBtn.textContent = "⏳…";

  try {
    const token = await getToken();
    if (!token) { archiveBtn.disabled = false; archiveBtn.textContent = `📦 Archiver (${group.emails.length})`; return; }

    let ok = 0, fallback = 0, errors = 0;
    for (const email of group.emails) {
      try {
        await callGraph(
          `https://graph.microsoft.com/v1.0/me/messages/${email.id}/move`,
          "POST", { destinationId: "archive" }, token
        );
        ok++;
      } catch (e) {
        // Fallback : déplacer vers la corbeille si le dossier Archive n'existe pas
        try {
          await callGraph(
            `https://graph.microsoft.com/v1.0/me/messages/${email.id}/move`,
            "POST", { destinationId: "deleteditems" }, token
          );
          fallback++;
          dbg(`Archivé dans corbeille (fallback): ${email.id}`, "warn");
        } catch (e2) {
          errors++;
          dbg(`Erreur archive ${email.id}: ${e2.message}`, "err");
        }
      }
    }

    if (errors === 0) {
      const msg = fallback > 0
        ? `✅ ${ok + fallback} email(s) de ${group.sender} déplacés (${fallback} en corbeille, pas d'archive).`
        : `✅ ${ok} email(s) de ${group.sender} archivés.`;
      // Retirer du state (garder les indices valides)
      groups[idx] = null;
      cardEl.remove();
      updateSummary();
      setStatus(msg);
      if (groups.filter(Boolean).length === 0) {
        document.getElementById("results-container").classList.add("hidden");
        setStatus("✅ Tout traité ! Rescannez pour vérifier.");
      }
    } else {
      archiveBtn.disabled = false;
      archiveBtn.textContent = `📦 Archiver (${group.emails.length})`;
      setStatus(`⚠️ ${ok + fallback} archivés, ${errors} erreur(s). Réessayez.`);
    }
  } catch (err) {
    dbg(`ERREUR ARCHIVE: ${err.message}`, "err");
    setStatus(`❌ Erreur : ${err.message}`);
    archiveBtn.disabled = false;
    archiveBtn.textContent = `📦 Archiver (${group.emails.length})`;
  }
}

function updateSummary() {
  const active = groups.filter(Boolean);
  const totalEmails = active.reduce((n, g) => n + g.emails.length, 0);
  document.getElementById("summary-label").innerHTML =
    `<span class="count-badge">${active.length}</span> expéditeur(s) · ${totalEmails} email(s)`;
}

// ============================================================
// SELECT ALL
// ============================================================
document.getElementById("select-all").addEventListener("change", function() {
  document.querySelectorAll(".group-checkbox").forEach(cb => cb.checked = this.checked);
});

// ============================================================
// BULK UNSUBSCRIBE (sélectionnés)
// ============================================================
// Stratégie :
//   - one-click  : POST en parallèle (silencieux), puis auto-archive
//   - graph-mail : Graph /unsubscribe séquentiel (évite le throttling), puis auto-archive
//   - popup      : impossible en masse (popup blocker + dialog Office unique) —
//                  on prévient l'utilisateur et il les fait un par un
document.getElementById("btn-unsub-bulk").addEventListener("click", async () => {
  const btn = document.getElementById("btn-unsub-bulk");
  const checked = [...document.querySelectorAll(".group-checkbox:checked")].map(cb => parseInt(cb.dataset.idx));
  if (checked.length === 0) { setStatus("Sélectionnez au moins un expéditeur."); return; }

  btn.disabled = true;
  const origLabel = btn.textContent;

  const oneClickIdx = checked.filter(i => groups[i]?.info.method === "one-click");
  const mailtoIdx   = checked.filter(i => groups[i]?.info.method === "graph-mailto");
  const popupIdx    = checked.filter(i => groups[i]?.info.method === "popup");

  dbg(`Bulk : ${oneClickIdx.length} one-click, ${mailtoIdx.length} mailto, ${popupIdx.length} popup`);

  let ok = 0, errors = 0;

  // --- 1-clic en parallèle ---
  if (oneClickIdx.length > 0) {
    btn.textContent = `⏳ 1-clic (${oneClickIdx.length})…`;
    const results = await Promise.all(oneClickIdx.map(i =>
      postOneClickUnsubscribe(groups[i].info.oneClickUrl).then(r => ({ i, r }))
    ));
    for (const { i, r } of results) {
      if (r) {
        ok++;
        // Feedback visuel sur chaque carte désinscrite
        const card = document.querySelector(`.group-item[data-idx="${i}"]`);
        const unsubBtn = card?.querySelector(".btn-sm.unsub");
        if (card && unsubBtn) markCardSuccess(card, unsubBtn, `✅ Désinscrit`);
      } else { errors++; }
    }
  }

  // --- mailto via Graph (séquentiel) ---
  if (mailtoIdx.length > 0) {
    try {
      const token = await getToken();
      if (token) {
        for (const i of mailtoIdx) {
          btn.textContent = `⏳ mailto (${mailtoIdx.indexOf(i) + 1}/${mailtoIdx.length})…`;
          try {
            await callGraph(
              `https://graph.microsoft.com/beta/me/messages/${groups[i].emails[0].id}/unsubscribe`,
              "POST", null, token
            );
            ok++;
            const card = document.querySelector(`.group-item[data-idx="${i}"]`);
            const unsubBtn = card?.querySelector(".btn-sm.unsub");
            if (card && unsubBtn) markCardSuccess(card, unsubBtn, `✅ Mail envoyé`);
          } catch (e) { errors++; dbg(`Graph /unsubscribe ${i}: ${e.message}`, "err"); }
        }
      }
    } catch (e) { dbg(`Bulk mailto token: ${e.message}`, "err"); }
  }

  // --- Popup : impossible en masse, on explique ---
  let msg = `✅ ${ok} désinscription(s) envoyée(s)`;
  if (errors > 0) msg += `, ${errors} erreur(s)`;
  if (popupIdx.length > 0) {
    msg += `. ⚠️ ${popupIdx.length} expéditeur(s) nécessitent une page web — clique "Se désinscrire" sur chacun.`;
  }
  if (ok > 0) msg += ` Utilise 📦 Archiver (sélectionnés) pour nettoyer les emails existants.`;
  setStatus(msg);

  btn.disabled = false;
  btn.textContent = origLabel;
});

// ============================================================
// BULK ARCHIVE (sélectionnés)
// ============================================================
document.getElementById("btn-archive-bulk").addEventListener("click", async () => {
  const btn = document.getElementById("btn-archive-bulk");
  const checkedIdx = [...document.querySelectorAll(".group-checkbox:checked")].map(cb => parseInt(cb.dataset.idx));
  if (checkedIdx.length === 0) { setStatus("Sélectionnez au moins un expéditeur."); return; }

  btn.disabled = true;
  const originalLabel = btn.textContent;
  btn.textContent = "⏳ Archivage...";

  let done = 0;
  for (const idx of checkedIdx) {
    const card = document.querySelector(`.group-item[data-idx="${idx}"]`);
    const archiveBtn = card?.querySelector(".btn-sm.archive");
    if (!card || !archiveBtn) continue;
    await archiveGroup(idx, card, archiveBtn);
    done++;
    setStatus(`📦 Archivage... ${done}/${checkedIdx.length}`);
  }

  btn.disabled = false;
  btn.textContent = originalLabel;
  setStatus(`✅ ${done} expéditeur(s) archivé(s).`);
});

// ============================================================
// HELPERS
// ============================================================
function setStatus(msg) {
  document.getElementById("status").textContent = msg;
  if (msg) dbg(`Status: ${msg}`);
}
function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
