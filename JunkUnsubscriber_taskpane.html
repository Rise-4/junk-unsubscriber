<script>
// ============================================================
// GARDE-FOU : si cette page est chargée dans un popup MSAL
// (window.opener présent + hash d'auth), on délègue juste à MSAL
// et on ne lance PAS l'UI du taskpane (évite block_nested_popups).
// ============================================================
if (window.opener && window.opener !== window && /[#&](code|error|id_token|access_token)=/.test(window.location.hash)) {
  document.addEventListener("DOMContentLoaded", () => {
    document.body.innerHTML = "<p style='font-family:Segoe UI;font-size:12px;color:#605e5c;padding:20px'>Authentification…</p>";
  });
  // MSAL (chargé par le <script> au-dessus) traitera le hash via handleRedirectPromise
  // puis fermera automatiquement le popup. On n'exécute pas la suite.
  throw new Error("__msal_popup_redirect__");
}

// ============================================================
// DEBUG
// ============================================================
const debugLines = [];
function dbg(msg, level = "info") {
  const ts = new Date().toLocaleTimeString("fr-FR");
  const cls = { ok:"dbg-ok", warn:"dbg-warn", err:"dbg-err" }[level] || "dbg-info";
  debugLines.push({ line: `[${ts}] ${msg}`, cls });
  console.log(`[DBG-${level.toUpperCase()}]`, msg);
  renderDebug();
}
function renderDebug() {
  const p = document.getElementById("debug-panel");
  if (!p) return;
  p.innerHTML = debugLines.map(d => `<div class="dbg-line ${d.cls}">${escHtml(d.line)}</div>`).join("");
  p.scrollTop = p.scrollHeight;
}
function toggleDebug() { document.getElementById("debug-panel").classList.toggle("visible"); }

// ============================================================
// TELEMETRY (PostHog)
// ============================================================
// Capture événements d'usage anonymisés : compteurs, durées, méthodes.
// Aucun contenu d'email, expéditeur ou URL n'est envoyé. Identifiant = email Office,
// tenant dérivé du domaine pour breakdown Rise / Mantu / DXC dans les dashboards.
const APP_VERSION = "1.0.0.9";

function track(event, props) {
  try {
    if (typeof posthog !== "undefined" && posthog.capture) {
      posthog.capture(event, props || {});
    }
  } catch (e) { /* ne jamais casser l'addin pour de la télémétrie */ }
}

function identifyUser() {
  try {
    const email = Office?.context?.mailbox?.userProfile?.emailAddress;
    if (!email || typeof posthog === "undefined") return;
    const lower  = email.toLowerCase();
    const tenant = (lower.split("@")[1] || "unknown");
    posthog.identify(lower, { tenant });
    posthog.register({ app: "junk-unsubscriber", tenant, app_version: APP_VERSION });
    dbg(`PostHog identify: tenant=${tenant}`, "ok");
  } catch (e) { dbg(`PostHog identify failed: ${e.message}`, "warn"); }
}

// ============================================================
// CONFIG
// ============================================================
const CLIENT_ID   = "89bd4984-6324-4be4-b691-5d74abeff00f";
// Multi-tenant : chaque utilisateur s'authentifie sur SON tenant (Rise, Mantu, DXC…)
const AUTHORITY   = "https://login.microsoftonline.com/organizations";
// Page dédiée pour la redirection : évite de recharger le taskpane dans le popup
// (sinon block_nested_popups quand la 2e instance re-init MSAL).
const REDIRECT_URI = "https://rise-4.github.io/junk-unsubscriber/auth-redirect.html";
// Mail.Send requis pour l'action Graph /unsubscribe (cas mailto:) — RFC 8058
const GRAPH_SCOPES = ["Mail.ReadWrite", "Mail.Send"];
const PAGE_SIZE   = 200; // emails par dossier par page (Graph max = 1000, on reste raisonnable)

// Opti A : ne demander QUE les 2 headers utiles via propriétés étendues MAPI
// (au lieu de tout internetMessageHeaders qui pèse ~30-100 KB par mail à cause de DKIM/Received).
// PSETID_InternetHeaders : namespace standard où Exchange stocke chaque header internet
// indexé par son nom (lowercase). Payload divisé par ~10-20× sur le scan.
const HEADER_NS  = "{00020386-0000-0000-C000-000000000046}";
const LU_FILTER  = `id eq 'String ${HEADER_NS} Name list-unsubscribe' or id eq 'String ${HEADER_NS} Name list-unsubscribe-post'`;
const LU_EXPAND  = `singleValueExtendedProperties($filter=${encodeURIComponent(LU_FILTER)})`;
const MSG_SELECT = "id,subject,from";

dbg("Page chargée"); dbg(`Authority: ${AUTHORITY}`);

// ============================================================
// MSAL
// ============================================================
let msalInstance = null, msalReady = false;

const msalConfig = {
  auth: { clientId: CLIENT_ID, authority: AUTHORITY, redirectUri: REDIRECT_URI, navigateToLoginRequestUrl: false },
  cache: {
    // localStorage : partage l'état d'interaction entre taskpane et popup d'auth
    // (les diagnostics confirment qu'il est accessible dans ce contexte).
    cacheLocation: "localStorage",
    storeAuthStateInCookie: true
  },
  system: {
    loggerOptions: {
      logLevel: 3,
      loggerCallback: (level, msg, pii) => { if (!pii) dbg(`[MSAL] ${msg}`); }
    }
  }
};

async function initMsal() {
  try {
    msalInstance = new msal.PublicClientApplication(msalConfig);
    await msalInstance.initialize();
    const resp = await msalInstance.handleRedirectPromise();
    if (resp) dbg(`Redirect token reçu: ${resp.account.username}`, "ok");
    msalReady = true;
    dbg("MSAL prêt", "ok");
  } catch (err) {
    dbg(`MSAL init ERREUR: ${err.message}`, "err");
    msalReady = false;
  }
}

async function getToken() {
  if (!msalReady) {
    await initMsal();
    if (!msalReady) throw new Error("MSAL non initialisé");
  }

  // Boîte Outlook actuellement ouverte (Mantu, Rise, etc.) — sert à choisir le bon compte MSAL
  // quand plusieurs comptes sont en cache (cas du jonglage entre tenants).
  const currentMailbox = (Office.context?.mailbox?.userProfile?.emailAddress || "").toLowerCase();
  dbg(`Boîte Outlook courante: ${currentMailbox || "(inconnue)"}`);

  const accounts = msalInstance.getAllAccounts();
  const matching = currentMailbox
    ? accounts.find(a => a.username?.toLowerCase() === currentMailbox)
    : accounts[0];

  if (matching) {
    try {
      const r = await msalInstance.acquireTokenSilent({ scopes: GRAPH_SCOPES, account: matching });
      dbg(`Token silent OK — ${r.account.username}`, "ok");
      return r.accessToken;
    } catch (e) { dbg(`Silent échoué: ${e.message}`, "warn"); }
  } else if (accounts.length > 0 && currentMailbox) {
    dbg(`Comptes en cache (${accounts.map(a => a.username).join(", ")}) ne matchent pas ${currentMailbox} — popup forcée`, "warn");
  }

  try {
    const popupRequest = { scopes: GRAPH_SCOPES };
    if (currentMailbox) {
      popupRequest.loginHint = currentMailbox;       // pré-remplit l'email
      popupRequest.prompt    = "select_account";     // empêche un SSO silencieux sur le mauvais compte
    }
    const r = await msalInstance.acquireTokenPopup(popupRequest);
    dbg(`Token popup OK — ${r.account.username}`, "ok");
    return r.accessToken;
  } catch (popupErr) {
    dbg(`Popup échoué: ${popupErr.message}`, "warn");
    const blocked = popupErr.message?.includes("popup_window_error") ||
                    popupErr.message?.includes("monitor_window_timeout") ||
                    popupErr.message?.includes("block") ||
                    popupErr.message?.includes("popup_blocked") ||
                    popupErr.errorCode === "popup_window_error" ||
                    popupErr.errorCode === "monitor_window_timeout";
    if (blocked) {
      dbg("Popup bloqué — fallback redirect...", "warn");
      const redirectRequest = { scopes: GRAPH_SCOPES };
      if (currentMailbox) {
        redirectRequest.loginHint = currentMailbox;
        redirectRequest.prompt    = "select_account";
      }
      await msalInstance.acquireTokenRedirect(redirectRequest);
      return null;
    }
    throw popupErr;
  }
}

// ============================================================
// GRAPH API
// ============================================================
async function callGraph(url, method, body, token, retries = 3) {
  dbg(`Graph ${method} ${url.substring(0, 90)}...`);
  const opts = {
    method: method || "GET",
    headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" }
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);

  // Throttling Graph : respecter Retry-After puis retenter
  if (res.status === 429 && retries > 0) {
    const ra = parseInt(res.headers.get("Retry-After") || "1", 10);
    dbg(`Graph 429 — retry dans ${ra}s (reste ${retries - 1})`, "warn");
    await new Promise(r => setTimeout(r, ra * 1000));
    return callGraph(url, method, body, token, retries - 1);
  }
  // Erreurs transientes : 503, 504 → retry avec backoff exponentiel
  if ((res.status === 503 || res.status === 504) && retries > 0) {
    const wait = (4 - retries) * 1000;
    dbg(`Graph ${res.status} — retry dans ${wait}ms`, "warn");
    await new Promise(r => setTimeout(r, wait));
    return callGraph(url, method, body, token, retries - 1);
  }

  if (!res.ok) {
    const txt = await res.text();
    dbg(`Graph ERREUR ${res.status}: ${txt.substring(0, 200)}`, "err");
    throw new Error(`Graph ${res.status}: ${txt.substring(0, 100)}`);
  }
  if (method === "POST" && res.status === 201) return res.json();
  if (res.status === 204 || method === "DELETE") return null;
  if (res.status === 202) return null; // Graph unsubscribe action
  return res.json();
}

// ============================================================
// HEADER PARSING (RFC 8058 aware)
// ============================================================
// Convertit la réponse Graph en tableau {name, value} unifié, peu importe la source :
//  - via $expand=singleValueExtendedProperties (chemin rapide, Opti A — payload léger)
//  - via $select=internetMessageHeaders (legacy, gardé en filet de sécurité)
function extractHeadersFromMessage(msg) {
  if (msg.singleValueExtendedProperties && Array.isArray(msg.singleValueExtendedProperties)) {
    return msg.singleValueExtendedProperties.map(p => {
      // id format : "String {GUID} Name <header-name>"
      const m = p.id?.match(/Name\s+(.+)$/);
      return { name: m ? m[1] : "", value: p.value || "" };
    });
  }
  return msg.internetMessageHeaders || [];
}


// Retourne { oneClickUrl, mailtoUrl, httpsUrl, displayLabel, method }
// - oneClickUrl  : URL à POSTer en RFC 8058 one-click (header + List-Unsubscribe-Post)
// - mailtoUrl    : mailto: trouvé dans le header (utilisable via Graph /unsubscribe)
// - httpsUrl     : URL HTTPS du header (utilisable en GET silencieux no-cors)
// - displayLabel : courte description user-friendly (hostname ou adresse mailto)
// - method       : "one-click" | "graph-mailto" | "http-auto" | "popup" | null
//   "http-auto"  : GET silencieux no-cors (lien HTTPS sans garantie RFC 8058 — on tente quand même, fire-and-forget).
//   "popup"      : ultime recours quand rien d'auto possible (mailto sans Graph, URL suspecte, etc.)
function extractUnsubscribeInfo(headers) {
  const info = { oneClickUrl: null, mailtoUrl: null, httpsUrl: null, displayLabel: "", method: null };
  const hs = Array.isArray(headers) ? headers : [];
  const byName = (n) => hs.find(h => h.name && h.name.toLowerCase() === n.toLowerCase());

  const lu = byName("list-unsubscribe");
  const luPost = byName("list-unsubscribe-post");

  if (lu && lu.value) {
    const tokens = [...lu.value.matchAll(/<([^>]+)>/g)].map(m => m[1].trim());
    for (const t of tokens) {
      if (/^mailto:/i.test(t) && !info.mailtoUrl) info.mailtoUrl = t;
      else if (/^https?:\/\//i.test(t) && !info.httpsUrl) info.httpsUrl = t;
    }
    if (!info.httpsUrl && !info.mailtoUrl) {
      const plain = lu.value.match(/(https?:\/\/[^\s,<>]+)/i);
      if (plain) info.httpsUrl = plain[1];
    }
    if (luPost && /list-unsubscribe\s*=\s*one-click/i.test(luPost.value) && info.httpsUrl) {
      info.oneClickUrl = info.httpsUrl;
    }
  }

  // Label affiché : hostname (propre, lisible) plutôt que l'URL brute type /api/...
  if (info.oneClickUrl || info.httpsUrl) {
    try { info.displayLabel = new URL(info.oneClickUrl || info.httpsUrl).hostname; }
    catch { info.displayLabel = (info.oneClickUrl || info.httpsUrl).substring(0, 40); }
  } else if (info.mailtoUrl) {
    info.displayLabel = info.mailtoUrl.replace(/^mailto:/i, "").split("?")[0];
  }

  // Ordre par fiabilité : RFC 8058 garanti > Graph mailto (silent, géré par Microsoft) > GET silencieux
  if (info.oneClickUrl)      info.method = "one-click";
  else if (info.mailtoUrl)   info.method = "graph-mailto";
  else if (info.httpsUrl)    info.method = "http-auto";
  return info;
}

// ============================================================
// BODY SCAN (emails sans header List-Unsubscribe)
// ============================================================
// ~15-25% des newsletters légitimes (Substack ancien, PME, prospection FR/EN)
// n'implémentent pas RFC 2369. Le lien de désinscription n'existe que dans le corps.
// On utilise method "http-auto" → GET silencieux no-cors (fire-and-forget, safe, pas de popup).
const UNSUB_TEXT_RE = /(unsubscribe|désinscri[pt]|désabonn|opt[- ]?out|manage\s+(email|subscription)?\s*preferences?|ne\s+plus\s+recevoir|gérer\s+(mes|vos)\s+préférences|stop\s+receiving|remove\s+me)/i;
// Heuristique : expéditeur qui "sent la newsletter" (évite de scanner les emails perso).
// Capture les patterns fréquents : noreply@, newsletter@, info@, bonjour@, hello@, etc.
const NEWSLETTER_SENDER_RE = /(^|[._@-])(no-?reply|newsletter|news|mailing|notifications?|hello|bonjour|contact|info|bounce|announce|updates?|digest|team|support|marketing|communication|press|welcome|equipe|contact-?us)([._@-]|$)/i;

function extractBodyUnsubLink(body) {
  if (!body || !body.content) return null;
  const content = body.content;
  // HTML : ancres <a href="URL">texte</a> dont le texte contient un mot-clé unsub
  if (body.contentType === "html") {
    const re = /<a\s+[^>]*href=["']([^"']+)["'][^>]*>([\s\S]{0,300}?)<\/a>/gi;
    let m;
    while ((m = re.exec(content)) !== null) {
      const href = m[1];
      if (!/^https?:\/\//i.test(href)) continue;
      const text = m[2].replace(/<[^>]+>/g, " ").replace(/&[a-z#0-9]+;/gi, " ");
      if (UNSUB_TEXT_RE.test(text)) return href;
    }
    // Fallback : certains mails sont en HTML mais liens en format texte brut
    // (ex: Outlook qui convertit HTML→Plain en transit)
    const plain = content.replace(/<[^>]+>/g, " ");
    const mt = plain.match(/(?:unsubscribe|désinscri[pt]\w*|désabonn\w*|opt[- ]?out|ne\s+plus\s+recevoir)[\s\S]{0,80}?(https?:\/\/[^\s<>"')]+)/i);
    if (mt) return mt[1];
    return null;
  }
  // Text brut : "Unsubscribe <https://...>" ou "Désinscription https://..."
  const re = /(?:unsubscribe|désinscri[pt]\w*|désabonn\w*|opt[- ]?out|ne\s+plus\s+recevoir)[\s\S]{0,80}?<?(https?:\/\/[^\s>"')]+)>?/i;
  const m = content.match(re);
  return m ? m[1] : null;
}

// Heuristique conservatrice pour l'INBOX : on ne veut PAS proposer de désinscrire
// d'emails humains (founders@startup.com, mary@brand.com, etc.).
// Pour le dossier JUNK, on bypass cette heuristique (cf. processMessageIntoGroups).
function looksLikeNewsletterSender(senderEmail, senderName) {
  const e = (senderEmail || "").toLowerCase();
  const n = (senderName || "").toLowerCase();
  if (NEWSLETTER_SENDER_RE.test(e)) return true;
  if (NEWSLETTER_SENDER_RE.test(n)) return true;
  // Prénoms/noms simples d'humain : prenom.nom@, prenom_nom@ → exclure
  const local = e.split("@")[0] || "";
  if (/^[a-zéèêàçùâîô]+[._-][a-zéèêàçùâîô]+$/i.test(local) && local.length < 30) return false;
  // Default : candidat si local part contient chiffres (tracking IDs, envois en masse)
  if (/\d{3,}/.test(local)) return true;
  return false;
}

// ============================================================
// STATE
// ============================================================
// Groups indexed by integer (avoids CSS selector escaping issues)
// { key, sender, senderEmail, info: {oneClickUrl, mailtoUrl, httpsUrl, displayLabel, method, source},
//   folders: Set, emails: [{id, subject, folder}] }
let groups = [];
let junkNextLink = null;
let inboxNextLink = null;
// Emails scannés sans header List-Unsubscribe (candidats pour body scan)
let bodyScanCandidates = [];
// Compteurs cumulés (incluent les pages "load more")
let scannedCounts = { junk: 0, inbox: 0 };
// Cache du dossier "Éléments supprimés" résolu une fois via Graph
// (nom "magique" deleteditems → vrai ID + displayName localisé)
let deletedItemsFolder = null;

async function getDeletedItemsFolder(token) {
  if (deletedItemsFolder) return deletedItemsFolder;
  const resp = await callGraph(
    `https://graph.microsoft.com/v1.0/me/mailFolders/deleteditems?$select=id,displayName`,
    "GET", null, token
  );
  deletedItemsFolder = { id: resp.id, displayName: resp.displayName };
  dbg(`Corbeille résolue : "${resp.displayName}" (id: ${resp.id.substring(0, 24)}…)`, "ok");
  return deletedItemsFolder;
}

// Extrait le domaine "racine" (2 derniers labels) d'un email pour regrouper
// les variantes VERP / sous-domaines (bounce-xxx@mail.acme.com → acme.com,
// news@e.linkedin.com → linkedin.com). Fallback sur l'email complet normalisé.
function groupingKey(senderEmail) {
  const email = (senderEmail || "").trim().toLowerCase();
  const at = email.lastIndexOf("@");
  if (at === -1) return email;
  const domain = email.slice(at + 1);
  const parts = domain.split(".").filter(Boolean);
  if (parts.length < 2) return email;
  return parts.slice(-2).join(".");
}

function findOrCreateGroup(senderEmail, info, sender) {
  const key = groupingKey(senderEmail);
  // Filter null entries (groupes supprimés laissés en place pour préserver les data-idx)
  let g = groups.find(g => g && g.key === key);
  if (!g) {
    g = { key, sender, senderEmail, info, folders: new Set(), emails: [] };
    groups.push(g);
  } else {
    // Upgrade l'info si le nouvel email fournit une méthode meilleure
    // (one-click > graph-mailto > http-auto > popup)
    const rank = { "one-click": 4, "graph-mailto": 3, "http-auto": 2, "popup": 1 };
    if ((rank[info.method] || 0) > (rank[g.info.method] || 0)) g.info = info;
  }
  return g;
}

// ============================================================
// FETCH + PROCESS A PAGE
// ============================================================
// Un seul appel Graph par dossier pour ~200 emails. Avec l'Opti A on ne récupère
// QUE les 2 headers utiles via propriétés étendues — pas besoin de fallback $batch
// (les ext-props ne sont pas omises silencieusement comme l'était internetMessageHeaders).
async function fetchAndProcess(url, folder, token) {
  const data = await callGraph(url, "GET", null, token).catch(err => {
    dbg(`Erreur scan ${folder}: ${err.message}`, "warn");
    return null;
  });
  if (!data) return null;

  const messages = data.value || [];
  scannedCounts[folder] = (scannedCounts[folder] || 0) + messages.length;
  dbg(`${folder}: ${messages.length} messages (cumul: ${scannedCounts[folder]})`, "ok");

  for (const d of messages) {
    processMessageIntoGroups(d, folder);
  }

  return data["@odata.nextLink"] || null;
}

function processMessageIntoGroups(d, folder) {
  const info = extractUnsubscribeInfo(extractHeadersFromMessage(d));
  const senderEmail = d.from?.emailAddress?.address || "";
  const sender      = d.from?.emailAddress?.name || senderEmail || "Inconnu";
  if (!info.method) {
    // Pas de header → candidat pour body scan.
    // Junk : Outlook a déjà flaggé l'email → on body-scan systématiquement (zéro filtre).
    // Inbox : heuristique stricte pour préserver les humains (founders@..., mary@..., etc.).
    if (senderEmail && (folder === "junk" || looksLikeNewsletterSender(senderEmail, sender))) {
      bodyScanCandidates.push({ id: d.id, folder, senderEmail, sender, subject: d.subject });
    }
    return;
  }
  info.source = "header";
  const g = findOrCreateGroup(senderEmail, info, sender);
  g.folders.add(folder);
  g.emails.push({ id: d.id, subject: d.subject || "(sans objet)", folder });
}

// Scan le body des candidats (emails sans header).
// Dédoublonnage par sender : 1 seul body-scan par expéditeur, mais tous les emails
// "frères" (mêmes sender, non scannés) sont ajoutés au groupe quand le lien est trouvé
// → l'utilisateur peut quand même les supprimer en bloc.
// $batch de 20, 3 vagues concurrentes. Plafond 500 expéditeurs uniques.
async function scanBodiesForUnsubLinks(candidates, token) {
  if (!candidates || candidates.length === 0) return;

  // Dédoublonnage : même groupingKey → 1 rep + N "siblings"
  const byKey = new Map();
  for (const c of candidates) {
    const k = groupingKey(c.senderEmail);
    if (!byKey.has(k)) byKey.set(k, { rep: c, siblings: [] });
    else byKey.get(k).siblings.push(c);
  }
  const entries = [...byKey.values()];

  const MAX = 500;
  const slice = entries.slice(0, MAX);
  if (entries.length > MAX) {
    dbg(`Body scan : ${slice.length}/${entries.length} expéditeurs uniques (${candidates.length} emails au total, plafond ${MAX})`, "warn");
  } else {
    dbg(`Body scan : ${slice.length} expéditeur(s) unique(s) — ${candidates.length} email(s) couverts (dédoublonné)`);
  }

  const BATCH = 20, CONCURRENCY = 3;
  const batches = [];
  for (let i = 0; i < slice.length; i += BATCH) batches.push(slice.slice(i, i + BATCH));

  let found = 0;
  for (let i = 0; i < batches.length; i += CONCURRENCY) {
    const wave = batches.slice(i, i + CONCURRENCY);
    await Promise.all(wave.map(async chunk => {
      const requests = chunk.map((entry, idx) => ({
        id: String(idx),
        method: "GET",
        url: `/me/messages/${entry.rep.id}?$select=id,body`
      }));
      try {
        const resp = await callGraph("https://graph.microsoft.com/v1.0/$batch", "POST", { requests }, token);
        for (const r of (resp.responses || [])) {
          if (r.status !== 200 || !r.body) continue;
          const entry = chunk[parseInt(r.id)];
          if (!entry) continue;
          const url = extractBodyUnsubLink(r.body.body);
          if (!url) continue;
          const info = {
            oneClickUrl: null, mailtoUrl: null, httpsUrl: url,
            displayLabel: "", method: "http-auto", source: "body"
          };
          try { info.displayLabel = new URL(url).hostname; }
          catch { info.displayLabel = url.substring(0, 40); }

          // Le rep + tous les siblings (non scannés) atterrissent dans le même groupe
          const g = findOrCreateGroup(entry.rep.senderEmail, info, entry.rep.sender);
          g.folders.add(entry.rep.folder);
          g.emails.push({ id: entry.rep.id, subject: entry.rep.subject || "(sans objet)", folder: entry.rep.folder });
          for (const sib of entry.siblings) {
            g.folders.add(sib.folder);
            g.emails.push({ id: sib.id, subject: sib.subject || "(sans objet)", folder: sib.folder });
          }
          found++;
        }
      } catch (err) { dbg(`Body batch: ${err.message}`, "warn"); }
    }));
  }
  dbg(`Body scan : ${found} expéditeur(s) trouvé(s) via corps`, found > 0 ? "ok" : "info");
}

// ============================================================
// AUTO MODE (Indésirables uniquement)
// ============================================================
// État du toggle persisté en localStorage. Désactivé visuellement quand le scope
// est "Inbox" (pas de Junk → rien à automatiser).
(function initAutoMode() {
  const cb = document.getElementById("auto-mode-cb");
  cb.checked = localStorage.getItem("auto-mode") === "1";
  cb.addEventListener("change", () => localStorage.setItem("auto-mode", cb.checked ? "1" : "0"));

  function refreshAutoBar() {
    const scope = document.querySelector('input[name="scope"]:checked')?.value || "both";
    document.getElementById("auto-mode-bar").classList.toggle("disabled", scope === "inbox");
  }
  document.querySelectorAll('input[name="scope"]').forEach(r => r.addEventListener("change", refreshAutoBar));
  refreshAutoBar();
})();

// Désinscrit + supprime tous les expéditeurs trouvés dans Junk, sans interaction.
// Quand scope === "both", on ne touche QUE les emails du dossier Junk : si un même
// expéditeur a aussi des emails dans Inbox, ils restent intacts (group survives).
//
// Stratégie perf :
//  - Phase 1 : unsubs en parallèle (no-cors fire-and-forget pour one-click/http,
//    Graph /unsubscribe pour mailto — callGraph gère le throttling 429 tout seul).
//  - Phase 2 : moves vers corbeille via $batch (20 par lot, 3 lots concurrents)
//    → ~60 emails déplacés par seconde au lieu de 5/s en séquentiel.
async function runAutoMode(token) {
  const autoStartTs = Date.now();
  const targets = groups.filter(g => g && g.folders.has("junk"));
  if (targets.length === 0) {
    setStatus(`✅ Aucun expéditeur indésirable à traiter automatiquement.`);
    track("auto_mode_run", { targets: 0, unsub_ok: 0, emails_targeted: 0, emails_deleted: 0, duration_ms: Date.now() - autoStartTs });
    return;
  }

  setStatus(`⚡ Mode auto : désinscription de ${targets.length} expéditeur(s)...`);
  dbg(`Auto mode : ${targets.length} groupes ciblés`);

  // === Phase 1 : désinscriptions en parallèle ===
  const unsubResults = await Promise.all(targets.map(async g => {
    try {
      if (g.info.method === "one-click" && g.info.oneClickUrl) {
        return await postOneClickUnsubscribe(g.info.oneClickUrl);
      }
      if (g.info.method === "graph-mailto" && g.emails[0]?.id) {
        await callGraph(
          `https://graph.microsoft.com/beta/me/messages/${g.emails[0].id}/unsubscribe`,
          "POST", null, token
        );
        return true;
      }
      if (g.info.method === "http-auto" && g.info.httpsUrl) {
        return await silentGetUnsubscribe(g.info.httpsUrl);
      }
      // method "popup" : on skip l'unsub (pas automatisable) mais on supprime quand même
      // — pour le boss, Junk = poubelle ; le mail ré-arrivera et sera retraité au prochain scan.
      return false;
    } catch (e) {
      dbg(`Auto unsub ${g.sender}: ${e.message}`, "warn");
      return false;
    }
  }));
  const unsubOk = unsubResults.filter(Boolean).length;

  // === Phase 2 : suppression des emails Junk via $batch ===
  const trash = await getDeletedItemsFolder(token);
  const junkEmails = [];
  for (const g of targets) {
    for (const e of g.emails) if (e.folder === "junk") junkEmails.push({ groupRef: g, email: e });
  }

  setStatus(`⚡ Auto : ${unsubOk}/${targets.length} désinscrits · suppression de ${junkEmails.length} email(s)...`);

  const BATCH = 20, CONCURRENCY = 3;
  const deletedIds = new Set();
  const allBatches = [];
  for (let i = 0; i < junkEmails.length; i += BATCH) allBatches.push(junkEmails.slice(i, i + BATCH));

  for (let i = 0; i < allBatches.length; i += CONCURRENCY) {
    const wave = allBatches.slice(i, i + CONCURRENCY);
    await Promise.all(wave.map(async chunk => {
      const requests = chunk.map((entry, idx) => ({
        id: String(idx),
        method: "POST",
        url: `/me/messages/${entry.email.id}/move`,
        body: { destinationId: trash.id },
        headers: { "Content-Type": "application/json" }
      }));
      try {
        const resp = await callGraph("https://graph.microsoft.com/v1.0/$batch", "POST", { requests }, token);
        for (const r of (resp.responses || [])) {
          // 201 Created (move) = succès. 200 sur certains tenants. On vérifie parentFolderId
          // si le body est présent pour confirmation forte.
          if ((r.status === 201 || r.status === 200) && r.body) {
            const entry = chunk[parseInt(r.id)];
            if (entry && (!r.body.parentFolderId || r.body.parentFolderId === trash.id)) {
              deletedIds.add(entry.email.id);
            }
          }
        }
      } catch (e) { dbg(`Auto batch delete: ${e.message}`, "warn"); }
    }));
  }

  // === Phase 3 : update state & re-render ===
  // Groupe entièrement vidé (folders={junk}) → on retire du tableau.
  // Groupe mixte (folders={junk,inbox}) → on retire les emails Junk supprimés, on garde le reste.
  for (const g of targets) {
    const surviving = g.emails.filter(e => !deletedIds.has(e.id));
    if (surviving.length === 0) {
      const idx = groups.indexOf(g);
      if (idx !== -1) groups[idx] = null;
    } else {
      g.emails = surviving;
      g.folders = new Set(surviving.map(e => e.folder));
      g.unsubDone = true;
      g.unsubDoneLabel = "⚡ Auto traité";
    }
  }
  renderResults();
  if (groups.filter(Boolean).length === 0) {
    document.getElementById("results-container").classList.add("hidden");
  }

  const failedUnsub = targets.length - unsubOk;
  const failedDelete = junkEmails.length - deletedIds.size;
  let msg = `⚡ Auto terminé : ${unsubOk}/${targets.length} désinscrits, ${deletedIds.size}/${junkEmails.length} email(s) → "${trash.displayName}"`;
  if (failedUnsub > 0) msg += ` · ${failedUnsub} unsub non auto (popup)`;
  if (failedDelete > 0) msg += ` · ${failedDelete} suppression(s) en échec`;
  setStatus(msg);
  dbg(`Auto terminé : ${unsubOk}/${targets.length} unsub, ${deletedIds.size}/${junkEmails.length} delete`, "ok");
  track("auto_mode_run", {
    targets: targets.length,
    unsub_ok: unsubOk,
    unsub_failed: failedUnsub,
    emails_targeted: junkEmails.length,
    emails_deleted: deletedIds.size,
    delete_failed: failedDelete,
    duration_ms: Date.now() - autoStartTs
  });
}

// ============================================================
// SCAN BUTTON
// ============================================================
document.getElementById("btn-scan").addEventListener("click", async () => {
  const btn = document.getElementById("btn-scan");
  btn.disabled = true;
  setStatus("Connexion en cours...");
  document.getElementById("results-container").classList.add("hidden");
  document.getElementById("results").innerHTML = "";
  groups = [];
  junkNextLink = null;
  inboxNextLink = null;
  bodyScanCandidates = [];
  scannedCounts = { junk: 0, inbox: 0 };

  try {
    const token = await getToken();
    if (!token) { setStatus("⏳ Redirection d'authentification..."); btn.disabled = false; return; }

    const scope = document.querySelector('input[name="scope"]:checked')?.value || "both";
    const scanJunk  = scope === "both" || scope === "junk";
    const scanInbox = scope === "both" || scope === "inbox";
    const autoOn   = document.getElementById("auto-mode-cb").checked;
    const scanStartTs = Date.now();
    dbg(`Scan scope: ${scope}`);
    track("scan_started", { scope, auto_mode: autoOn });

    const scopeLabel = scope === "both" ? "Inbox + Indésirables"
                     : scope === "junk" ? "Indésirables"
                     : "Inbox";
    setStatus(`🔎 Scan en cours (${scopeLabel})...`);

    const [junkNext, inboxNext] = await Promise.all([
      scanJunk ? fetchAndProcess(
        `https://graph.microsoft.com/v1.0/me/mailFolders/junkemail/messages?$top=${PAGE_SIZE}&$select=${MSG_SELECT}&$expand=${LU_EXPAND}`,
        "junk", token
      ) : Promise.resolve(null),
      scanInbox ? fetchAndProcess(
        `https://graph.microsoft.com/v1.0/me/mailFolders/inbox/messages?$top=${PAGE_SIZE}&$select=${MSG_SELECT}&$expand=${LU_EXPAND}`,
        "inbox", token
      ) : Promise.resolve(null)
    ]);
    junkNextLink  = junkNext;
    inboxNextLink = inboxNext;

    // === Opti C : rendu incrémental ===
    // Affiche immédiatement les groupes trouvés via headers (~1-2s après le clic)
    // pendant que le body-scan tourne en parallèle ensuite.
    const headerOnlyCount = groups.filter(Boolean).length;
    if (headerOnlyCount > 0) {
      renderResults();
      document.getElementById("results-container").classList.remove("hidden");
      updateLoadMore();
    }

    // Body scan : récupère le corps des emails sans header qui ressemblent à des newsletters
    if (bodyScanCandidates.length > 0) {
      const candCount = Math.min(bodyScanCandidates.length, 500);
      setStatus(headerOnlyCount > 0
        ? `✅ ${headerOnlyCount} expéditeur(s) trouvé(s) · 🔎 Analyse approfondie de ${candCount} email(s)...`
        : `🔎 Analyse du corps de ${candCount} email(s)...`);
      await scanBodiesForUnsubLinks(bodyScanCandidates, token);
      bodyScanCandidates = [];
      // Re-render pour intégrer les groupes trouvés via le corps
      renderResults();
      document.getElementById("results-container").classList.remove("hidden");
      updateLoadMore();
    }

    const active = groups.filter(Boolean);
    const totalScanned = scannedCounts.junk + scannedCounts.inbox;

    // Agrège les méthodes pour la télémétrie (compteurs uniquement, aucun contenu)
    const methodCounts = { one_click: 0, mailto: 0, http_auto: 0, popup: 0 };
    let headerGroups = 0, bodyGroups = 0;
    for (const g of active) {
      const m = g.info.method;
      if (m === "one-click") methodCounts.one_click++;
      else if (m === "graph-mailto") methodCounts.mailto++;
      else if (m === "http-auto") methodCounts.http_auto++;
      else if (m === "popup") methodCounts.popup++;
      if (g.info.source === "body") bodyGroups++; else headerGroups++;
    }
    track("scan_completed", {
      scope,
      auto_mode: autoOn,
      duration_ms: Date.now() - scanStartTs,
      emails_scanned: totalScanned,
      junk_scanned: scannedCounts.junk,
      inbox_scanned: scannedCounts.inbox,
      groups_found: active.length,
      header_groups: headerGroups,
      body_groups: bodyGroups,
      methods_one_click: methodCounts.one_click,
      methods_mailto: methodCounts.mailto,
      methods_http_auto: methodCounts.http_auto,
      methods_popup: methodCounts.popup
    });

    if (active.length === 0) {
      setStatus(`✅ Aucune newsletter trouvée dans les ${totalScanned} derniers emails.`);
      btn.disabled = false;
      return;
    }

    // === Mode auto : désinscription + suppression sans confirmation côté Junk ===
    // N'agit que si scope inclut Indésirables ET case cochée. Inbox jamais touchée.
    if (autoOn && scanJunk) {
      await runAutoMode(token);
    } else {
      setStatus("");
    }

  } catch (err) {
    dbg(`ERREUR SCAN: ${err.message}`, "err");
    setStatus(`❌ Erreur : ${err.message}`);
    track("error", { stage: "scan", message: (err.message || "").substring(0, 200) });
  } finally {
    btn.disabled = false;
  }
});

// ============================================================
// LOAD MORE BUTTON
// ============================================================
document.getElementById("btn-load-more").addEventListener("click", async () => {
  const btn = document.getElementById("btn-load-more");
  btn.disabled = true;
  btn.textContent = "⏳ Chargement...";
  try {
    const token = await getToken();
    if (!token) { btn.disabled = false; btn.textContent = "▼ Scanner 100 emails de plus"; return; }
    await Promise.all([
      junkNextLink  ? fetchAndProcess(junkNextLink,  "junk",  token).then(nl => junkNextLink  = nl) : null,
      inboxNextLink ? fetchAndProcess(inboxNextLink, "inbox", token).then(nl => inboxNextLink = nl) : null,
    ]);
    // Affichage immédiat des nouveaux groupes header-based, puis enrichissement post body-scan
    renderResults();
    updateLoadMore();
    if (bodyScanCandidates.length > 0) {
      setStatus(`🔎 Analyse du corps de ${Math.min(bodyScanCandidates.length, 500)} email(s)...`);
      await scanBodiesForUnsubLinks(bodyScanCandidates, token);
      bodyScanCandidates = [];
      renderResults();
    }
    setStatus("");
  } catch (err) {
    dbg(`ERREUR LOAD MORE: ${err.message}`, "err");
    setStatus(`❌ Erreur : ${err.message}`);
  } finally {
    btn.disabled = false;
    btn.textContent = "▼ Scanner 100 emails de plus";
  }
});

function updateLoadMore() {
  document.getElementById("load-more-bar").classList.toggle("hidden", !junkNextLink && !inboxNextLink);
}

// ============================================================
// RENDER RESULTS
// ============================================================
function renderResults() {
  const container = document.getElementById("results");
  container.innerHTML = "";

  const active = groups.filter(Boolean);
  const totalEmails = active.reduce((n, g) => n + g.emails.length, 0);
  document.getElementById("summary-label").innerHTML =
    `<span class="count-badge">${active.length}</span> expéditeur(s) · ${totalEmails} email(s)`;

  groups.forEach((group, idx) => {
    if (!group) return; // skip slots vidés par delete
    const folderLabel = (group.folders.has("junk") && group.folders.has("inbox"))
      ? `<span class="folder-badge both">Junk+Inbox</span>`
      : group.folders.has("junk")
        ? `<span class="folder-badge junk">Junk</span>`
        : `<span class="folder-badge inbox">Inbox</span>`;

    const label = group.info.displayLabel || "";
    const methodIcon  = { "one-click": "⚡", "graph-mailto": "✉️", "http-auto": "🤫", "popup": "🔗" }[group.info.method] || "🔗";
    const methodLabel = { "one-click": "1-clic RFC 8058", "graph-mailto": "mail auto", "http-auto": "GET silencieux", "popup": "page web" }[group.info.method] || "";
    const fullUrl = group.info.oneClickUrl || group.info.httpsUrl || group.info.mailtoUrl || "";

    const div = document.createElement("div");
    div.className = "group-item";
    div.dataset.idx = idx;
    div.innerHTML = `
      <div class="group-header">
        <input type="checkbox" class="group-checkbox" data-idx="${idx}" checked/>
        <div class="group-meta">
          <div class="group-sender">${folderLabel}${escHtml(group.sender)}<span class="count-badge">${group.emails.length}</span></div>
          <div class="group-email">${escHtml(group.senderEmail)}</div>
        </div>
      </div>
      <div class="group-url" title="${escHtml(fullUrl)}">${methodIcon} <span style="color:#605e5c">[${methodLabel}]</span> ${escHtml(label)}</div>
      <div class="group-actions">
        <button class="btn-sm unsub">${methodIcon} Se désinscrire</button>
        <button class="btn-sm delete">🗑️ Supprimer (${group.emails.length})</button>
      </div>`;

    const unsubBtn  = div.querySelector(".btn-sm.unsub");
    const deleteBtn = div.querySelector(".btn-sm.delete");

    unsubBtn.addEventListener("click",  () => executeUnsubscribe(idx, div, unsubBtn, deleteBtn));
    deleteBtn.addEventListener("click", () => deleteGroup(idx, div, deleteBtn));

    container.appendChild(div);

    // Restaure l'état vert/désactivé si l'utilisateur a déjà cliqué Se désinscrire
    // sur ce groupe avant qu'un re-render (post body-scan) n'ait lieu.
    if (group.unsubDone) {
      applySuccessStyle(div, unsubBtn, group.unsubDoneLabel || "✅ Désinscrit");
    }
  });

  document.getElementById("select-all").checked = true;
}

// ============================================================
// EXECUTE UNSUBSCRIBE (RFC 8058 + fallbacks silencieux)
// ============================================================
// Stratégie par ordre de fiabilité (aucune n'ouvre de popup sauf dernier recours) :
//   1. one-click POST (RFC 8058) — POST "List-Unsubscribe=One-Click", garanti par le sender
//   2. Graph /unsubscribe (mailto) — Graph envoie le mail de désabonnement côté Microsoft
//   3. http-auto GET silencieux (no-cors) — on tape l'URL cliquable du header/body,
//      fire-and-forget. Couvre les senders sans RFC 8058 et les liens trouvés dans le body.
//   4. popup (ultime recours) — uniquement si aucune URL HTTPS exploitable n'existe
async function executeUnsubscribe(idx, cardEl, unsubBtn, deleteBtn) {
  const group = groups[idx];
  if (!group) return;
  const info = group.info;
  unsubBtn.disabled = true;
  const origLabel = unsubBtn.textContent;
  unsubBtn.textContent = "⏳…";

  try {
    // --- Méthode 1 : RFC 8058 one-click POST ---
    if (info.method === "one-click" && info.oneClickUrl) {
      dbg(`One-click POST → ${info.oneClickUrl}`);
      const ok = await postOneClickUnsubscribe(info.oneClickUrl);
      if (ok) {
        markCardSuccess(cardEl, unsubBtn, `✅ Désinscrit`);
        setStatus(`✅ ${group.sender} : désinscription one-click envoyée. Clique 🗑️ Supprimer pour jeter les ${group.emails.length} email(s).`);
        track("unsub_executed", { method: "one-click", success: true, source: info.source, bulk: false });
        return;
      }
      dbg(`One-click POST échoué, fallback GET silencieux`, "warn");
    }

    // --- Méthode 2 : Graph /unsubscribe (mailto) ---
    if (info.method === "graph-mailto" && group.emails[0]?.id) {
      dbg(`Graph /unsubscribe via ${info.mailtoUrl}`);
      try {
        const token = await getToken();
        if (!token) { unsubBtn.disabled = false; unsubBtn.textContent = origLabel; return; }
        await callGraph(
          `https://graph.microsoft.com/beta/me/messages/${group.emails[0].id}/unsubscribe`,
          "POST", null, token
        );
        markCardSuccess(cardEl, unsubBtn, `✅ Désinscrit`);
        setStatus(`✅ ${group.sender} : mail de désinscription envoyé. Clique 🗑️ Supprimer pour jeter les ${group.emails.length} email(s).`);
        track("unsub_executed", { method: "graph-mailto", success: true, source: info.source, bulk: false });
        return;
      } catch (err) {
        dbg(`Graph /unsubscribe ERREUR: ${err.message} — fallback GET silencieux`, "warn");
      }
    }

    // --- Méthode 3 : GET silencieux no-cors (http-auto, ou fallback des méthodes 1/2) ---
    // Inclut aussi les URL trouvées dans le body (source="body") et les URL HTTPS de header
    // sans List-Unsubscribe-Post. On ne peut pas vérifier le code retour mais la requête part.
    const httpUrl = info.httpsUrl || info.oneClickUrl;
    if (httpUrl) {
      dbg(`GET silencieux → ${httpUrl}`);
      const ok = await silentGetUnsubscribe(httpUrl);
      if (ok) {
        markCardSuccess(cardEl, unsubBtn, `✅ Désinscrit`);
        const src = info.source === "body" ? " (lien trouvé dans le corps)" : "";
        setStatus(`✅ ${group.sender}${src} : désinscription envoyée. Clique 🗑️ Supprimer pour jeter les ${group.emails.length} email(s).`);
        track("unsub_executed", { method: "http-auto", success: true, source: info.source, bulk: false });
        return;
      }
      dbg(`GET silencieux échoué — fallback popup`, "warn");
    }

    // --- Méthode 4 : popup (ultime recours, rien d'auto possible) ---
    const url = info.httpsUrl || info.mailtoUrl;
    if (!url) {
      setStatus(`❌ Aucune méthode de désinscription trouvée pour ${group.sender}.`);
      unsubBtn.disabled = false;
      unsubBtn.textContent = origLabel;
      track("unsub_executed", { method: "none", success: false, source: info.source, bulk: false });
      return;
    }
    dbg(`Popup (dernier recours) → ${url}`);
    openUrlPopup(url);
    setStatus(`🔗 Page de désinscription ouverte pour ${group.sender}. Finalise dans l'onglet.`);
    unsubBtn.disabled = false;
    unsubBtn.textContent = "✓ Ouvert — supprimer ?";
    track("unsub_executed", { method: "popup", success: true, source: info.source, bulk: false });
  } catch (err) {
    dbg(`ERREUR executeUnsubscribe: ${err.message}`, "err");
    setStatus(`❌ Erreur : ${err.message}`);
    unsubBtn.disabled = false;
    unsubBtn.textContent = origLabel;
    track("error", { stage: "unsub", message: (err.message || "").substring(0, 200) });
  }
}

// POST one-click RFC 8058. no-cors → réponse opaque, on ne peut pas lire le statut.
// Retourne true tant que le fetch ne throw pas (pas d'erreur DNS/TLS).
async function postOneClickUnsubscribe(url) {
  try {
    await fetch(url, {
      method: "POST",
      mode: "no-cors",
      credentials: "omit",
      referrerPolicy: "no-referrer",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: "List-Unsubscribe=One-Click"
    });
    dbg(`One-click POST envoyé (no-cors, opaque)`, "ok");
    return true;
  } catch (e) {
    dbg(`One-click POST erreur réseau: ${e.message}`, "err");
    return false;
  }
}

// GET silencieux no-cors sur l'URL de désinscription. Fire-and-forget.
// Couvre : (a) liens HTTPS du header sans List-Unsubscribe-Post,
//          (b) liens extraits du body (Podim, Edissio, etc.).
// Beaucoup de providers (ActiveCampaign, Mailjet, Brevo, Ennelle…) désinscrivent
// sur un simple GET. Pour les providers à double-confirmation, l'email réapparaîtra
// au prochain scan — l'user refera l'action.
async function silentGetUnsubscribe(url) {
  try {
    await fetch(url, {
      method: "GET",
      mode: "no-cors",
      credentials: "omit",
      referrerPolicy: "no-referrer"
    });
    dbg(`GET silencieux envoyé (no-cors, opaque)`, "ok");
    return true;
  } catch (e) {
    dbg(`GET silencieux erreur réseau: ${e.message}`, "err");
    return false;
  }
}

// Ouvre une URL dans un popup/dialog Office. Utilisé pour les cas non-automatisables.
function openUrlPopup(url) {
  try {
    if (Office?.context?.ui?.displayDialogAsync) {
      Office.context.ui.displayDialogAsync(url, { height: 60, width: 60 }, result => {
        if (result.status === Office.AsyncResultStatus.Failed) {
          dbg(`Dialog échoué — fallback window.open`, "warn");
          window.open(url, "_blank");
        }
      });
    } else {
      window.open(url, "_blank");
    }
  } catch (e) { window.open(url, "_blank"); }
}

// Feedback visuel quand la désinscription a réussi mais qu'il n'y a pas de page à ouvrir
// (one-click POST ou Graph mailto). Carte verte + bouton "✅ Désinscrit" désactivé.
function applySuccessStyle(cardEl, unsubBtn, label) {
  cardEl.style.transition = "background 0.3s, border-color 0.3s";
  cardEl.style.background = "#dff6dd";
  cardEl.style.borderColor = "#107c10";
  unsubBtn.textContent = label;
  unsubBtn.style.color = "#107c10";
  unsubBtn.style.borderColor = "#107c10";
  unsubBtn.style.background = "#f0fbef";
  unsubBtn.disabled = true;
}

// Persiste l'état "désinscrit" sur le groupe pour qu'un re-render incrémental
// (après que le body-scan ait terminé) ne perde pas le visuel vert/désactivé.
function markCardSuccess(cardEl, unsubBtn, label) {
  const idx = parseInt(cardEl.dataset.idx);
  if (!isNaN(idx) && groups[idx]) {
    groups[idx].unsubDone = true;
    groups[idx].unsubDoneLabel = label;
  }
  applySuccessStyle(cardEl, unsubBtn, label);
}

// ============================================================
// DELETE GROUP (corbeille)
// ============================================================
// Flow : /me/messages/{id}/move avec destinationId = ID RÉEL du dossier corbeille
// (résolu via Graph une fois, localisé). Retourne le message avec son nouveau
// parentFolderId qu'on VÉRIFIE pour confirmer qu'il a bien atterri. Le client
// Outlook peut prendre 5-60s pour synchroniser — la confirmation Graph est
// immédiate et fiable (source de vérité côté Microsoft).
async function deleteGroup(idx, cardEl, deleteBtn, bulk = false) {
  const group = groups[idx];
  if (!group) return;

  deleteBtn.disabled = true;
  deleteBtn.textContent = "⏳…";
  const initialCount = group.emails.length;

  try {
    const token = await getToken();
    if (!token) { deleteBtn.disabled = false; deleteBtn.textContent = `🗑️ Supprimer (${group.emails.length})`; return; }

    const trash = await getDeletedItemsFolder(token);
    let ok = 0, confirmed = 0, errors = 0;
    const movedSubjects = [];
    for (const email of group.emails) {
      try {
        // Utilise l'ID résolu (plus fiable que le nom magique "deleteditems" sur certains tenants)
        const moved = await callGraph(
          `https://graph.microsoft.com/v1.0/me/messages/${email.id}/move`,
          "POST", { destinationId: trash.id }, token
        );
        ok++;
        if (moved && moved.parentFolderId === trash.id) {
          confirmed++;
          movedSubjects.push(email.subject);
          dbg(`${email.folder} → ${trash.displayName} ✓ : "${email.subject}"`, "ok");
        } else {
          dbg(`⚠️ Move OK mais parentFolderId=${moved?.parentFolderId?.substring(0,24) || "?"} (attendu ${trash.id.substring(0,24)})`, "warn");
        }
      } catch (e) {
        errors++;
        dbg(`Erreur suppression ${email.id}: ${e.message}`, "err");
      }
    }

    // Sonde post-move : liste les 5 derniers messages du dossier corbeille pour
    // PROUVER que les emails y sont (côté Graph, serveur Microsoft).
    // Si Outlook client n'affiche pas, c'est un pur problème de sync → Ctrl+F5.
    if (confirmed > 0) {
      try {
        const probe = await callGraph(
          `https://graph.microsoft.com/v1.0/me/mailFolders/${trash.id}/messages?$top=5&$select=id,subject,lastModifiedDateTime&$orderby=lastModifiedDateTime desc`,
          "GET", null, token
        );
        const items = probe.value || [];
        dbg(`📋 Sonde "${trash.displayName}" — 5 plus récents :`, "info");
        const movedSet = new Set(movedSubjects);
        let foundCount = 0;
        for (const it of items) {
          const here = movedSet.has(it.subject) ? "  ← VIENT D'ÊTRE DÉPLACÉ" : "";
          if (here) foundCount++;
          const ts = new Date(it.lastModifiedDateTime).toLocaleTimeString("fr-FR");
          dbg(`   [${ts}] "${it.subject}"${here}`);
        }
        dbg(`📋 Preuve : ${foundCount}/${confirmed} emails déplacés retrouvés dans "${trash.displayName}"`, foundCount === confirmed ? "ok" : "warn");
      } catch (e) {
        dbg(`Sonde corbeille : ${e.message}`, "warn");
      }
    }

    if (errors === 0) {
      groups[idx] = null;
      cardEl.remove();
      updateSummary();
      const allDone = groups.filter(Boolean).length === 0;
      const baseMsg = confirmed === ok
        ? `✅ ${ok} email(s) de ${group.sender} → "${trash.displayName}" (Graph confirme). Non visibles dans Outlook ? Ctrl+F5 ou clique ⟳ refresh (le client peut traîner 1 min).`
        : `✅ ${ok} email(s) déplacés (${confirmed}/${ok} confirmés dans "${trash.displayName}"). Vérifie le debug pour les autres.`;
      if (allDone) {
        document.getElementById("results-container").classList.add("hidden");
        setStatus(`${baseMsg} Tout traité ! Rescannez pour vérifier.`);
      } else {
        setStatus(baseMsg);
      }
    } else {
      deleteBtn.disabled = false;
      deleteBtn.textContent = `🗑️ Supprimer (${group.emails.length})`;
      setStatus(`⚠️ ${ok} supprimés (${confirmed} confirmés), ${errors} erreur(s). Réessayez.`);
    }
    track("delete_executed", { emails_count: initialCount, success_count: ok, confirmed_count: confirmed, errors, bulk });
  } catch (err) {
    dbg(`ERREUR SUPPRESSION: ${err.message}`, "err");
    setStatus(`❌ Erreur : ${err.message}`);
    deleteBtn.disabled = false;
    deleteBtn.textContent = `🗑️ Supprimer (${group.emails.length})`;
    track("error", { stage: "delete", message: (err.message || "").substring(0, 200) });
  }
}

function updateSummary() {
  const active = groups.filter(Boolean);
  const totalEmails = active.reduce((n, g) => n + g.emails.length, 0);
  document.getElementById("summary-label").innerHTML =
    `<span class="count-badge">${active.length}</span> expéditeur(s) · ${totalEmails} email(s)`;
}

// ============================================================
// SELECT ALL
// ============================================================
document.getElementById("select-all").addEventListener("change", function() {
  document.querySelectorAll(".group-checkbox").forEach(cb => cb.checked = this.checked);
});

// ============================================================
// BULK UNSUBSCRIBE (sélectionnés)
// ============================================================
// Stratégie :
//   - one-click + http-auto : fetch no-cors en parallèle (silencieux, rapide)
//   - graph-mailto          : Graph /unsubscribe séquentiel (évite le throttling)
//   - popup                 : impossible en masse, on prévient l'utilisateur
document.getElementById("btn-unsub-bulk").addEventListener("click", async () => {
  const btn = document.getElementById("btn-unsub-bulk");
  const checked = [...document.querySelectorAll(".group-checkbox:checked")].map(cb => parseInt(cb.dataset.idx));
  if (checked.length === 0) { setStatus("Sélectionnez au moins un expéditeur."); return; }

  btn.disabled = true;
  const origLabel = btn.textContent;

  const oneClickIdx = checked.filter(i => groups[i]?.info.method === "one-click");
  const httpAutoIdx = checked.filter(i => groups[i]?.info.method === "http-auto");
  const mailtoIdx   = checked.filter(i => groups[i]?.info.method === "graph-mailto");
  const popupIdx    = checked.filter(i => groups[i]?.info.method === "popup");

  dbg(`Bulk : ${oneClickIdx.length} one-click, ${httpAutoIdx.length} http-auto, ${mailtoIdx.length} mailto, ${popupIdx.length} popup`);

  let ok = 0, errors = 0;

  // --- 1-clic RFC 8058 en parallèle ---
  if (oneClickIdx.length > 0) {
    btn.textContent = `⏳ 1-clic (${oneClickIdx.length})…`;
    const results = await Promise.all(oneClickIdx.map(i =>
      postOneClickUnsubscribe(groups[i].info.oneClickUrl).then(r => ({ i, r }))
    ));
    for (const { i, r } of results) {
      if (r) {
        ok++;
        const card = document.querySelector(`.group-item[data-idx="${i}"]`);
        const unsubBtn = card?.querySelector(".btn-sm.unsub");
        if (card && unsubBtn) markCardSuccess(card, unsubBtn, `✅ Désinscrit`);
      } else { errors++; }
      track("unsub_executed", { method: "one-click", success: !!r, source: groups[i]?.info.source, bulk: true });
    }
  }

  // --- GET silencieux en parallèle (headers sans RFC 8058 + liens body) ---
  if (httpAutoIdx.length > 0) {
    btn.textContent = `⏳ GET silencieux (${httpAutoIdx.length})…`;
    const results = await Promise.all(httpAutoIdx.map(i =>
      silentGetUnsubscribe(groups[i].info.httpsUrl).then(r => ({ i, r }))
    ));
    for (const { i, r } of results) {
      if (r) {
        ok++;
        const card = document.querySelector(`.group-item[data-idx="${i}"]`);
        const unsubBtn = card?.querySelector(".btn-sm.unsub");
        if (card && unsubBtn) markCardSuccess(card, unsubBtn, `✅ Désinscrit`);
      } else { errors++; }
      track("unsub_executed", { method: "http-auto", success: !!r, source: groups[i]?.info.source, bulk: true });
    }
  }

  // --- mailto via Graph (séquentiel pour éviter le throttling sendMail) ---
  if (mailtoIdx.length > 0) {
    try {
      const token = await getToken();
      if (token) {
        for (const i of mailtoIdx) {
          btn.textContent = `⏳ mailto (${mailtoIdx.indexOf(i) + 1}/${mailtoIdx.length})…`;
          let success = false;
          try {
            await callGraph(
              `https://graph.microsoft.com/beta/me/messages/${groups[i].emails[0].id}/unsubscribe`,
              "POST", null, token
            );
            ok++; success = true;
            const card = document.querySelector(`.group-item[data-idx="${i}"]`);
            const unsubBtn = card?.querySelector(".btn-sm.unsub");
            if (card && unsubBtn) markCardSuccess(card, unsubBtn, `✅ Désinscrit`);
          } catch (e) { errors++; dbg(`Graph /unsubscribe ${i}: ${e.message}`, "err"); }
          track("unsub_executed", { method: "graph-mailto", success, source: groups[i]?.info.source, bulk: true });
        }
      }
    } catch (e) { dbg(`Bulk mailto token: ${e.message}`, "err"); }
  }

  // --- Popup : rare maintenant (seulement si rien d'auto), traité un par un ---
  let msg = `✅ ${ok} désinscription(s) envoyée(s)`;
  if (errors > 0) msg += `, ${errors} erreur(s)`;
  if (popupIdx.length > 0) {
    msg += `. ⚠️ ${popupIdx.length} expéditeur(s) nécessitent une page web — clique "Se désinscrire" sur chacun.`;
  }
  if (ok > 0) msg += ` Utilise 🗑️ Supprimer (sélectionnés) pour jeter les emails existants.`;
  setStatus(msg);

  btn.disabled = false;
  btn.textContent = origLabel;
});

// ============================================================
// BULK DELETE (sélectionnés → corbeille)
// ============================================================
document.getElementById("btn-delete-bulk").addEventListener("click", async () => {
  const btn = document.getElementById("btn-delete-bulk");
  const checkedIdx = [...document.querySelectorAll(".group-checkbox:checked")].map(cb => parseInt(cb.dataset.idx));
  if (checkedIdx.length === 0) { setStatus("Sélectionnez au moins un expéditeur."); return; }

  btn.disabled = true;
  const originalLabel = btn.textContent;
  btn.textContent = "⏳ Suppression...";

  let done = 0;
  for (const idx of checkedIdx) {
    const card = document.querySelector(`.group-item[data-idx="${idx}"]`);
    const deleteBtn = card?.querySelector(".btn-sm.delete");
    if (!card || !deleteBtn) continue;
    await deleteGroup(idx, card, deleteBtn, true);
    done++;
    setStatus(`🗑️ Suppression... ${done}/${checkedIdx.length}`);
  }

  btn.disabled = false;
  btn.textContent = originalLabel;
  const folderName = deletedItemsFolder?.displayName || "la corbeille";
  setStatus(`✅ ${done} expéditeur(s) déplacés vers "${folderName}" (l'affichage Outlook peut prendre 1 min à se rafraîchir).`);
});

// ============================================================
// HELPERS
// ============================================================
function setStatus(msg) {
  document.getElementById("status").textContent = msg;
  if (msg) dbg(`Status: ${msg}`);
}
function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
